<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="graphics.css" />
  <title>Messages - Richdos Gaming</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .msg-list{max-height:44vh;overflow:auto}
    .msg-item{border:1px solid rgba(163,225,255,.36);border-radius:10px;padding:8px;margin:6px 0;background:rgba(7,18,31,.68)}
    .msg-item.unread{border-color:rgba(255,196,122,.65);background:rgba(45,31,10,.42)}
  </style>
</head>
<body>
  <main class="hub">
    <header class="hero">
      <p class="brand">Richdos Gaming Website</p>
      <h1>Messages</h1>
      <p class="tag">Send messages to friends and manage your inbox.</p>
    </header>

    <section class="about">
      <h2>Quick Links</h2>
      <p>
        <a href="index.html">Home</a> |
        <a href="account.html">Account</a> |
        <a href="help-center.html">Help Center</a> |
        <a href="updates.html">Updates</a>
      </p>
      <p id="msgSummary">Loading inbox...</p>
      <p id="msgStatus" class="status-line"></p>
    </section>

    <section class="about stack">
      <article class="mini-card">
        <h2>Send Message To Friend</h2>
        <div class="glass-strip">
          <input id="msgTarget" class="input" type="text" maxlength="24" placeholder="Friend username" />
          <input id="msgText" class="input" type="text" maxlength="280" placeholder="Message text" />
          <button id="sendMsgBtn" class="btn" type="button">Send</button>
        </div>
      </article>

      <article class="mini-card">
        <h2>Inbox</h2>
        <div id="inbox" class="msg-list"></div>
      </article>

      <article class="mini-card" id="staffMsgPanel" hidden>
        <h2>Staff Broadcast (Owner/Admin)</h2>
        <div class="glass-strip">
          <input id="staffBroadcastText" class="input" type="text" maxlength="280" placeholder="Announcement to all players" />
          <button id="staffBroadcastBtn" class="btn" type="button">Broadcast</button>
        </div>
      </article>
    </section>
  </main>

  <script src="player-system.js"></script>
  <script>
    function esc(s){return String(s||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

    async function renderInbox() {
      await RGW.syncCurrentAccountFromLan();
      const me = RGW.getAccount() || { username: RGW.getCurrentUsername() || 'Guest' };
      const inbox = RGW.getInbox(me.username);
      const unread = inbox.filter(x => !x.read).length;
      document.getElementById('msgSummary').textContent = `Player: ${me.username} | Unread: ${unread}`;
      const wrap = document.getElementById('inbox');
      if (!inbox.length) {
        wrap.innerHTML = '<p>No messages yet.</p>';
        return;
      }
      wrap.innerHTML = inbox.map(m => {
        const unreadCls = m.read ? '' : ' unread';
        return `<div class="msg-item${unreadCls}"><p><strong>From:</strong> ${esc(m.from)}</p><p>${esc(m.text)}</p><p class="meta">${new Date(m.at).toLocaleString()}</p><button class="btn" data-read="${esc(m.id)}" ${m.read ? 'disabled' : ''}>${m.read ? 'Read' : 'Mark Read'}</button></div>`;
      }).join('');

      wrap.querySelectorAll('button[data-read]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-read');
          RGW.markMessageRead(id);
          await renderInbox();
        });
      });

      const canStaff = RGW.isOwnerUser(me.username) || RGW.isAdminUser(me.username);
      const panel = document.getElementById('staffMsgPanel');
      if (panel) panel.hidden = !canStaff;
    }

    document.getElementById('sendMsgBtn').addEventListener('click', async () => {
      const to = document.getElementById('msgTarget').value.trim();
      const text = document.getElementById('msgText').value.trim();
      const r = RGW.sendMessage(to, text);
      document.getElementById('msgStatus').textContent = r.message || '';
      if (r.ok) {
        document.getElementById('msgText').value = '';
      }
      await renderInbox();
    });

    document.getElementById('staffBroadcastBtn').addEventListener('click', async () => {
      const text = document.getElementById('staffBroadcastText').value.trim();
      const r = RGW.sendStaffBroadcast(text);
      document.getElementById('msgStatus').textContent = r.message || '';
      if (r.ok) {
        document.getElementById('staffBroadcastText').value = '';
      }
      await renderInbox();
    });

    renderInbox();
  </script>
  <script src="music-system.js"></script>
</body>
</html>
