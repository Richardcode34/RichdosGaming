<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Penalty Pro</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0c2739; color: #eef8ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(95vw, 900px); text-align: center; }
    a { color: #9ed8ff; }
    canvas { width: 100%; max-width: 860px; border: 1px solid #95c5e3; border-radius: 10px; background: linear-gradient(#4ea466, #2d7a46); }
    select, button { border: 1px solid #97c6e4; border-radius: 8px; background: #245074; color: #eef9ff; padding: 7px 10px; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-1-shooting.html">P1 Shooting</a> | <a href="../page-2-racing.html">P2 Racing</a> | <a href="../page-3-puzzle.html">P3 Puzzle</a> | <a href="../page-4-arcade.html">P4 Arcade</a> | <a href="../page-5-realistic.html">P5 Realistic</a> | <a href="../page-6-party.html">P6 Party</a></p>
    <h1>Penalty Pro</h1>
    <p>Click where you want to shoot. Beat the goalie in 10 shots.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newMatch" type="button">New Match</button>
    </p>
    <canvas id="c" width="860" height="520"></canvas>
    <p id="hud"></p>
  </div>
  <script>
    const c = document.getElementById('c');
    const g = c.getContext('2d');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newMatchButton = document.getElementById('newMatch');

    const levels = {
      easy: { goalieSpeed: 3.2, saveRange: 55 },
      medium: { goalieSpeed: 4.2, saveRange: 72 },
      hard: { goalieSpeed: 5.2, saveRange: 88 }
    };

    let shotsLeft = 10;
    let goals = 0;
    let ball = { x: c.width / 2, y: 445, r: 12, moving: false, tx: 430, ty: 140 };
    let goalie = { x: 430, y: 135, w: 130, h: 26, dir: 1, targetX: 430 };

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function resetMatch() {
      shotsLeft = 10;
      goals = 0;
      ball.x = c.width / 2;
      ball.y = 445;
      ball.moving = false;
      goalie.x = 430;
      goalie.targetX = 430;
    }

    function kick(targetX, targetY) {
      if (shotsLeft <= 0 || ball.moving) return;
      ball.tx = Math.max(235, Math.min(625, targetX));
      ball.ty = Math.max(72, Math.min(190, targetY));
      ball.moving = true;
    }

    function update() {
      const lv = cfg();

      goalie.x += lv.goalieSpeed * goalie.dir;
      if (goalie.x < 250 || goalie.x > 610) goalie.dir *= -1;

      if (ball.moving) {
        ball.x += (ball.tx - ball.x) * 0.14;
        ball.y += (ball.ty - ball.y) * 0.14;
        ball.r = Math.max(5, ball.r - 0.2);

        if (Math.hypot(ball.tx - ball.x, ball.ty - ball.y) < 6) {
          const saved = Math.abs(ball.x - goalie.x) <= lv.saveRange && ball.y < 170;
          if (!saved) goals += 1;
          shotsLeft -= 1;
          ball.x = c.width / 2;
          ball.y = 445;
          ball.r = 12;
          ball.moving = false;
        }
      }
    }

    function drawPitch() {
      g.fillStyle = '#3f9658';
      g.fillRect(0, 0, c.width, c.height);
      g.strokeStyle = 'rgba(255,255,255,0.4)';
      g.lineWidth = 2;
      g.strokeRect(220, 58, 420, 145);
      g.strokeRect(265, 58, 330, 90);
      g.beginPath();
      g.arc(c.width / 2, 390, 85, Math.PI, 0);
      g.stroke();
    }

    function draw() {
      drawPitch();

      g.fillStyle = '#f3f6ff';
      g.fillRect(goalie.x - goalie.w / 2, goalie.y, goalie.w, goalie.h);

      g.fillStyle = '#ffffff';
      g.beginPath();
      g.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      g.fill();
      g.strokeStyle = '#1b1b1b';
      g.stroke();

      hud.textContent = shotsLeft > 0
        ? `Level: ${levelSelect.value} | Goals: ${goals} | Shots left: ${shotsLeft}`
        : `Match over (${levelSelect.value})! Goals scored: ${goals}/10. Click New Match.`;
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    c.addEventListener('mousedown', e => {
      const r = c.getBoundingClientRect();
      const x = (e.clientX - r.left) * (c.width / r.width);
      const y = (e.clientY - r.top) * (c.height / r.height);
      kick(x, y);
    });

    newMatchButton.addEventListener('click', resetMatch);
    levelSelect.addEventListener('change', resetMatch);

    resetMatch();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
