<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Rhythm Smash</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #1b1430; color: #f5f0ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(95vw, 900px); text-align: center; }
    a { color: #d6b9ff; }
    #game { margin: 10px auto; width: min(94vw, 820px); height: 430px; border: 1px solid #b99be6; border-radius: 12px; background: linear-gradient(180deg, #2b1f49, #1a1231); position: relative; overflow: hidden; }
    .lane { position: absolute; top: 0; bottom: 0; width: 24%; border-right: 1px solid rgba(255,255,255,.12); }
    .lane:last-child { border-right: 0; }
    .hit { position: absolute; left: 0; right: 0; bottom: 24px; height: 10px; background: rgba(160,255,220,.35); }
    .note { position: absolute; width: 18%; height: 16px; border-radius: 8px; background: #ffb6e5; box-shadow: 0 0 12px rgba(255,182,229,.55); }
    button, select { border: 1px solid #c6a7f2; border-radius: 8px; background: #5d4290; color: #f7f1ff; padding: 8px 12px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-6-party.html">P6 Party</a> | <a href="../page-4-arcade.html">P4 Arcade</a></p>
    <h1>Rhythm Smash</h1>
    <p>Rhythm game. Press A S D F when notes hit the line.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newRun" type="button">New Song</button>
    </p>
    <div id="game"></div>
    <p id="hud"></p>
  </div>

  <script>
    const game = document.getElementById('game');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newRunButton = document.getElementById('newRun');

    const levels = {
      easy: { spawnEvery: 56, speed: 2.9 },
      medium: { spawnEvery: 44, speed: 3.5 },
      hard: { spawnEvery: 34, speed: 4.3 }
    };

    const lanes = [0, 1, 2, 3];
    const keys = ['a', 's', 'd', 'f'];
    const laneX = [3, 27, 51, 75];

    let notes = [];
    let tick = 0;
    let score = 0;
    let combo = 0;
    let misses = 0;
    let over = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function reset() {
      notes = [];
      tick = 0;
      score = 0;
      combo = 0;
      misses = 0;
      over = false;
      buildLanes();
    }

    function buildLanes() {
      game.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        const lane = document.createElement('div');
        lane.className = 'lane';
        lane.style.left = `${i * 25}%`;
        game.appendChild(lane);
      }
      const hit = document.createElement('div');
      hit.className = 'hit';
      game.appendChild(hit);
    }

    function spawn() {
      const lane = lanes[Math.floor(Math.random() * lanes.length)];
      notes.push({ lane, y: -18, active: true });
    }

    function hitLane(lane) {
      if (over) return;
      let best = -1;
      let bestDist = 999;
      for (let i = 0; i < notes.length; i++) {
        const n = notes[i];
        if (!n.active || n.lane !== lane) continue;
        const d = Math.abs((game.clientHeight - 34) - n.y);
        if (d < bestDist) {
          bestDist = d;
          best = i;
        }
      }

      if (best >= 0 && bestDist <= 24) {
        notes[best].active = false;
        score += 10 + Math.min(20, combo);
        combo += 1;
      } else {
        combo = 0;
        misses += 1;
      }

      if (misses >= 18) over = true;
    }

    function update() {
      if (over) return;
      tick += 1;
      if (tick % cfg().spawnEvery === 0) spawn();

      for (const n of notes) {
        if (!n.active) continue;
        n.y += cfg().speed;
        if (n.y > game.clientHeight + 20) {
          n.active = false;
          misses += 1;
          combo = 0;
        }
      }

      notes = notes.filter(n => n.active);
      if (misses >= 18) over = true;
    }

    function render() {
      game.querySelectorAll('.note').forEach(n => n.remove());
      for (const n of notes) {
        const el = document.createElement('div');
        el.className = 'note';
        el.style.left = `${laneX[n.lane]}%`;
        el.style.top = `${n.y}px`;
        game.appendChild(el);
      }

      hud.textContent = over
        ? `Song Over (${levelSelect.value}) | Score: ${score}`
        : `Level: ${levelSelect.value} | Score: ${score} | Combo: ${combo} | Misses: ${misses}/18`;
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      const i = keys.indexOf(k);
      if (i >= 0) hitLane(i);
    });

    newRunButton.addEventListener('click', reset);
    levelSelect.addEventListener('change', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
