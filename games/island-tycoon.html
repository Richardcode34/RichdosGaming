<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Island Tycoon</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #173225; color: #e9fff4; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(95vw, 900px); text-align: center; }
    a { color: #a9f8cf; }
    #board { margin: 10px auto; width: min(94vw, 780px); display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    .tile { height: 90px; border: 1px solid rgba(200,255,230,.4); border-radius: 8px; background: #28503b; color: #f0fff7; font-weight: 700; cursor: pointer; }
    .tile.villa { background: #457f61; }
    .tile.shop { background: #4d6d9f; }
    .tile.park { background: #5f8b47; }
    button, select { border: 1px solid #9fd7b7; border-radius: 8px; background: #2f684a; color: #eefff5; padding: 8px 12px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-5-realistic.html">P5 Realistic</a> | <a href="../page-6-party.html">P6 Party</a></p>
    <h1>Island Tycoon</h1>
    <p>Tycoon/management game. Build the best island economy.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newIsland" type="button">New Island</button>
    </p>
    <p>
      Build:
      <button data-type="villa" type="button">Villa (40)</button>
      <button data-type="shop" type="button">Shop (60)</button>
      <button data-type="park" type="button">Park (30)</button>
    </p>
    <div id="board"></div>
    <p id="hud"></p>
  </div>

  <script>
    const board = document.getElementById('board');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newIslandButton = document.getElementById('newIsland');
    const buildButtons = [...document.querySelectorAll('button[data-type]')];

    const levels = {
      easy: { startMoney: 260, target: 800 },
      medium: { startMoney: 220, target: 1000 },
      hard: { startMoney: 180, target: 1200 }
    };

    const costs = { villa: 40, shop: 60, park: 30 };
    const income = { villa: 7, shop: 11, park: 4 };

    let tiles = [];
    let selected = 'villa';
    let money = 0;
    let score = 0;
    let tick = 0;
    let won = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function reset() {
      tiles = Array.from({ length: 24 }, () => ({ type: 'empty' }));
      selected = 'villa';
      money = cfg().startMoney;
      score = 0;
      tick = 0;
      won = false;
      render();
    }

    function build(index) {
      if (won) return;
      const t = tiles[index];
      if (t.type !== 'empty') return;
      const price = costs[selected];
      if (money < price) return;
      money -= price;
      t.type = selected;
      score += 5;
      render();
    }

    function update() {
      if (won) return;
      tick += 1;
      if (tick % 60 !== 0) return;
      let gain = 0;
      for (const t of tiles) {
        if (t.type !== 'empty') gain += income[t.type] || 0;
      }
      money += gain;
      score += Math.floor(gain / 3);
      if (score >= cfg().target) {
        won = true;
        score += 80;
      }
    }

    function render() {
      board.innerHTML = '';
      tiles.forEach((t, i) => {
        const b = document.createElement('button');
        b.className = 'tile' + (t.type === 'empty' ? '' : ` ${t.type}`);
        b.type = 'button';
        b.textContent = t.type === 'empty' ? 'Empty' : t.type[0].toUpperCase() + t.type.slice(1);
        b.addEventListener('click', () => build(i));
        board.appendChild(b);
      });

      hud.textContent = won
        ? `Island Complete (${levelSelect.value})! Score: ${score}`
        : `Level: ${levelSelect.value} | Build: ${selected} | Money: ${money} | Score: ${score}/${cfg().target}`;
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    buildButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        selected = btn.dataset.type;
      });
    });

    newIslandButton.addEventListener('click', reset);
    levelSelect.addEventListener('change', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
