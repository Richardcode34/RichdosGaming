<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Mine Crafter Survival</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #1a2b1c; color: #ecf9ec; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(95vw, 920px); text-align: center; }
    a { color: #b6ffd0; }
    #world { margin: 10px auto; width: min(94vw, 860px); height: 430px; border: 1px solid #9fddb1; border-radius: 10px; background: linear-gradient(#3f7a46, #2f5b36); position: relative; overflow: hidden; }
    .player, .tree, .stone, .zombie { position: absolute; }
    .player { width: 24px; height: 24px; background: #ffe096; border-radius: 6px; border: 1px solid #f8f0bf; }
    .tree { width: 26px; height: 32px; background: #295031; border-radius: 4px; border: 1px solid #4f8559; }
    .stone { width: 24px; height: 24px; background: #7f8890; border-radius: 4px; border: 1px solid #c8d1d8; }
    .zombie { width: 24px; height: 24px; background: #74b76b; border-radius: 6px; border: 1px solid #a4df9b; }
    button, select { border: 1px solid #a4d9b4; border-radius: 8px; background: #325d3a; color: #ecf9ec; padding: 8px 10px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-7-minecraft.html">P7 Minecraft</a> | <a href="../page-4-arcade.html">P4 Arcade</a></p>
    <h1>Mine Crafter Survival</h1>
    <p>Collect wood and stone, craft a shelter, and survive zombies.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newRun" type="button">New World</button>
    </p>
    <div id="world"></div>
    <p id="hud"></p>
  </div>

  <script>
    const world = document.getElementById('world');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newRunButton = document.getElementById('newRun');

    const W = 860;
    const H = 430;
    const keys = { left: false, right: false, up: false, down: false };

    const levels = {
      easy: { trees: 8, stones: 6, zombies: 2, speed: 2.5, target: 140 },
      medium: { trees: 10, stones: 8, zombies: 3, speed: 3.0, target: 190 },
      hard: { trees: 12, stones: 10, zombies: 5, speed: 3.5, target: 240 }
    };

    let player;
    let trees = [];
    let stones = [];
    let zombies = [];
    let wood = 0;
    let rock = 0;
    let score = 0;
    let over = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function intersects(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function spawnItems() {
      trees = [];
      stones = [];
      zombies = [];

      for (let i = 0; i < cfg().trees; i++) {
        trees.push({ x: 30 + Math.random() * (W - 70), y: 30 + Math.random() * (H - 70), w: 26, h: 32, alive: true });
      }
      for (let i = 0; i < cfg().stones; i++) {
        stones.push({ x: 30 + Math.random() * (W - 70), y: 30 + Math.random() * (H - 70), w: 24, h: 24, alive: true });
      }
      for (let i = 0; i < cfg().zombies; i++) {
        zombies.push({ x: 100 + i * 120, y: 90 + (i % 3) * 90, w: 24, h: 24, vx: i % 2 ? 1.3 : -1.3, vy: i % 2 ? -1.1 : 1.1 });
      }
    }

    function reset() {
      player = { x: W / 2 - 12, y: H / 2 - 12, w: 24, h: 24 };
      wood = 0;
      rock = 0;
      score = 0;
      over = false;
      spawnItems();
      render();
    }

    function update() {
      if (over) return;

      const s = cfg().speed;
      if (keys.left) player.x -= s;
      if (keys.right) player.x += s;
      if (keys.up) player.y -= s;
      if (keys.down) player.y += s;
      player.x = Math.max(0, Math.min(W - player.w, player.x));
      player.y = Math.max(0, Math.min(H - player.h, player.y));

      for (const t of trees) {
        if (!t.alive) continue;
        if (intersects(player, t)) {
          t.alive = false;
          wood += 1;
          score += 8;
        }
      }

      for (const sItem of stones) {
        if (!sItem.alive) continue;
        if (intersects(player, sItem)) {
          sItem.alive = false;
          rock += 1;
          score += 10;
        }
      }

      for (const z of zombies) {
        z.x += z.vx;
        z.y += z.vy;
        if (z.x < 0 || z.x > W - z.w) z.vx *= -1;
        if (z.y < 0 || z.y > H - z.h) z.vy *= -1;
        if (intersects(player, z)) {
          score = Math.max(0, score - 16);
        }
      }

      const shelterCrafted = wood >= 6 && rock >= 4;
      if (shelterCrafted) {
        score += 25;
        over = true;
      }

      if (score >= cfg().target) {
        over = true;
      }
    }

    function render() {
      world.innerHTML = '';

      for (const t of trees) {
        if (!t.alive) continue;
        const el = document.createElement('div');
        el.className = 'tree';
        el.style.left = `${t.x}px`;
        el.style.top = `${t.y}px`;
        world.appendChild(el);
      }

      for (const sItem of stones) {
        if (!sItem.alive) continue;
        const el = document.createElement('div');
        el.className = 'stone';
        el.style.left = `${sItem.x}px`;
        el.style.top = `${sItem.y}px`;
        world.appendChild(el);
      }

      for (const z of zombies) {
        const el = document.createElement('div');
        el.className = 'zombie';
        el.style.left = `${z.x}px`;
        el.style.top = `${z.y}px`;
        world.appendChild(el);
      }

      const me = document.createElement('div');
      me.className = 'player';
      me.style.left = `${player.x}px`;
      me.style.top = `${player.y}px`;
      world.appendChild(me);

      hud.textContent = over
        ? `Run complete (${levelSelect.value}) | Score: ${score} | Wood: ${wood} | Stone: ${rock}`
        : `Level: ${levelSelect.value} | Score: ${score} | Wood: ${wood}/6 | Stone: ${rock}/4`;
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = true;
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = true;
    });

    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = false;
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = false;
    });

    newRunButton.addEventListener('click', reset);
    levelSelect.addEventListener('change', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
