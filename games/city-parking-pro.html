<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>City Parking Pro</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #101b2a; color: #eef8ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(94vw, 840px); text-align: center; }
    a { color: #9ed8ff; }
    canvas { border: 1px solid #8fc0df; border-radius: 10px; background: linear-gradient(#22374a, #0f1d2b); }
    select, button { border: 1px solid #97c6e4; border-radius: 8px; background: #275074; color: #eef9ff; padding: 7px 10px; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-2-racing.html">P2 Racing</a> | <a href="../page-5-realistic.html">P5 Realistic</a></p>
    <h1>City Parking Pro</h1>
    <p>Park your car into marked spots. WASD or Arrow keys to drive.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newGame" type="button">New Game</button>
    </p>
    <canvas id="c" width="760" height="460"></canvas>
    <p id="hud"></p>
  </div>
  <script>
    const c = document.getElementById('c');
    const g = c.getContext('2d');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newGameButton = document.getElementById('newGame');

    const levels = {
      easy: { cones: 8, time: 80 },
      medium: { cones: 12, time: 65 },
      hard: { cones: 16, time: 50 }
    };

    const keys = { up: false, down: false, left: false, right: false };
    const car = { x: 120, y: 390, a: -Math.PI / 2, s: 0, w: 22, h: 38 };
    let cones = [];
    let spot = { x: 620, y: 90, w: 90, h: 50 };
    let timeLeft = 0;
    let timer = null;
    let over = false;
    let win = false;
    let score = 0;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function reset() {
      car.x = 120; car.y = 390; car.a = -Math.PI / 2; car.s = 0;
      cones = [];
      for (let i = 0; i < cfg().cones; i++) {
        cones.push({ x: 120 + Math.random() * 560, y: 70 + Math.random() * 320, r: 9 });
      }
      spot = { x: 560 + Math.random() * 120, y: 50 + Math.random() * 90, w: 90, h: 50 };
      timeLeft = cfg().time;
      over = false;
      win = false;
      score = 0;
      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft -= 1;
        if (timeLeft <= 0 && !over) {
          over = true;
          win = false;
          score = 0;
        }
      }, 1000);
    }

    function pointRect(x, y, r) {
      return x > r.x && x < r.x + r.w && y > r.y && y < r.y + r.h;
    }

    function update() {
      if (over) return;

      if (keys.up) car.s += 0.08;
      if (keys.down) car.s -= 0.08;
      car.s *= 0.97;
      car.s = Math.max(-2.4, Math.min(3.2, car.s));

      if (Math.abs(car.s) > 0.08) {
        if (keys.left) car.a -= 0.045;
        if (keys.right) car.a += 0.045;
      }

      car.x += Math.cos(car.a) * car.s;
      car.y += Math.sin(car.a) * car.s;

      if (car.x < 20 || car.x > c.width - 20 || car.y < 20 || car.y > c.height - 20) {
        over = true;
        win = false;
        score = 0;
      }

      for (const cone of cones) {
        if (Math.hypot(car.x - cone.x, car.y - cone.y) < 13) {
          over = true;
          win = false;
          score = 0;
          break;
        }
      }

      if (!over && pointRect(car.x, car.y, spot) && Math.abs(car.s) < 0.5) {
        over = true;
        win = true;
        score = 100 + timeLeft * 3;
      }
    }

    function drawCar() {
      g.save();
      g.translate(car.x, car.y);
      g.rotate(car.a + Math.PI / 2);
      g.fillStyle = '#67d4a5';
      g.fillRect(-car.w / 2, -car.h / 2, car.w, car.h);
      g.fillStyle = '#dff4ff';
      g.fillRect(-car.w / 2 + 3, -car.h / 2 + 4, car.w - 6, 11);
      g.restore();
    }

    function draw() {
      g.clearRect(0, 0, c.width, c.height);
      g.fillStyle = '#2c4358';
      g.fillRect(0, 0, c.width, c.height);

      g.strokeStyle = '#d8edff';
      g.lineWidth = 2;
      g.strokeRect(spot.x, spot.y, spot.w, spot.h);

      g.fillStyle = '#ff9f75';
      for (const cone of cones) {
        g.beginPath();
        g.arc(cone.x, cone.y, cone.r, 0, Math.PI * 2);
        g.fill();
      }

      drawCar();

      if (!over) {
        hud.textContent = `Level: ${levelSelect.value} | Time: ${timeLeft}s | Score: ${score}`;
      } else if (win) {
        hud.textContent = `Parked! (${levelSelect.value}) Score: ${score}`;
      } else {
        hud.textContent = `Game Over (${levelSelect.value}). Score: 0`;
      }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    addEventListener('keydown', e => {
      if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = true;
      if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = true;
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
      if (e.code === 'KeyR') reset();
    });
    addEventListener('keyup', e => {
      if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
      if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false;
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    });

    newGameButton.addEventListener('click', reset);
    levelSelect.addEventListener('change', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
