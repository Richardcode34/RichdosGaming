<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Snake Rush</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Trebuchet MS, sans-serif; background: #101f33; color: #eff7ff; }
    .shell { width: min(92vw, 700px); text-align: center; }
    a { color: #a4dcff; }
    canvas { border: 1px solid #8ec6e8; border-radius: 10px; background: #0a1626; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-1-shooting.html">P1 Shooting</a> | <a href="../page-2-racing.html">P2 Racing</a> | <a href="../page-3-puzzle.html">P3 Puzzle</a> | <a href="../page-4-arcade.html">P4 Arcade</a> | <a href="../page-5-realistic.html">P5 Realistic</a> | <a href="../page-6-party.html">P6 Party</a></p>
    <h1>Snake Rush</h1>
    <p>Move with Arrow keys. Eat food and avoid walls/tail. Press R to restart.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newGame" type="button">New Game</button>
    </p>
    <canvas id="c" width="520" height="520"></canvas>
    <p id="hud"></p>
  </div>
  <script>
    const c = document.getElementById('c');
    const x = c.getContext('2d');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newGame = document.getElementById('newGame');
    const levels = {
      easy: { startSpeed: 150, accel: 2 },
      medium: { startSpeed: 120, accel: 3 },
      hard: { startSpeed: 95, accel: 4 }
    };
    const size = 20;
    const cols = c.width / size;
    const rows = c.height / size;
    let snake, dir, food, score, over, speed, timer;

    function reset() {
      const level = levels[levelSelect.value] || levels.medium;
      snake = [{x: 10, y: 10}];
      dir = {x: 1, y: 0};
      food = {x: 15, y: 15};
      score = 0;
      over = false;
      speed = level.startSpeed;
      clearInterval(timer);
      timer = setInterval(step, speed);
    }

    function spawnFood() {
      food = { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) };
      if (snake.some(s => s.x === food.x && s.y === food.y)) spawnFood();
    }

    function step() {
      if (over) return;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.y < 0 || head.x >= cols || head.y >= rows || snake.some(s => s.x === head.x && s.y === head.y)) {
        over = true;
        return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        if (speed > 65) {
          speed -= (levels[levelSelect.value] || levels.medium).accel;
          clearInterval(timer);
          timer = setInterval(step, speed);
        }
        spawnFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function draw() {
      x.clearRect(0,0,c.width,c.height);
      x.fillStyle = '#58d2a4';
      for (const s of snake) x.fillRect(s.x*size+1, s.y*size+1, size-2, size-2);
      x.fillStyle = '#ff8f7f';
      x.fillRect(food.x*size+2, food.y*size+2, size-4, size-4);
      hud.textContent = over
        ? `Game Over (${levelSelect.value}). Score: ${score}. Press R or New Game.`
        : `Level: ${levelSelect.value} | Score: ${score}`;
    }

    addEventListener('keydown', e => {
      if (e.code === 'ArrowUp' && dir.y !== 1) dir = {x:0,y:-1};
      if (e.code === 'ArrowDown' && dir.y !== -1) dir = {x:0,y:1};
      if (e.code === 'ArrowLeft' && dir.x !== 1) dir = {x:-1,y:0};
      if (e.code === 'ArrowRight' && dir.x !== -1) dir = {x:1,y:0};
      if (e.code === 'KeyR') { reset(); draw(); }
    });

    newGame.addEventListener('click', () => { reset(); draw(); });
    levelSelect.addEventListener('change', () => { reset(); draw(); });

    reset();
    draw();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
