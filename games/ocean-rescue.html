<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Ocean Rescue</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f2f44; color: #e8f7ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(95vw, 940px); text-align: center; }
    a { color: #a7ecff; }
    #sea { margin: 10px auto; width: min(94vw, 860px); height: 420px; border: 1px solid #8fd8f3; border-radius: 10px; background: linear-gradient(#2082b8, #135074); position: relative; overflow: hidden; }
    .boat, .person, .rock { position: absolute; }
    .boat { width: 42px; height: 24px; border-radius: 8px; background: #ffe093; border: 1px solid #fff4c6; }
    .person { width: 18px; height: 18px; border-radius: 999px; background: #fff2cc; border: 1px solid #d7c293; }
    .rock { width: 24px; height: 24px; border-radius: 8px; background: #657483; }
    button, select { border: 1px solid #8fd8f3; border-radius: 8px; background: #1e607f; color: #e9f8ff; padding: 8px 10px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-4-arcade.html">P4 Arcade</a> | <a href="../page-5-realistic.html">P5 Realistic</a></p>
    <h1>Ocean Rescue</h1>
    <p>Save swimmers and avoid rocks. Move with Arrow keys or A/D/W/S.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newRun" type="button">New Run</button>
    </p>
    <div id="sea"></div>
    <p id="hud"></p>
  </div>

  <script>
    const sea = document.getElementById('sea');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newRunButton = document.getElementById('newRun');

    const W = 860;
    const H = 420;
    const keys = { left: false, right: false, up: false, down: false };

    const levels = {
      easy: { people: 5, rocks: 3, speed: 2.6 },
      medium: { people: 7, rocks: 4, speed: 3.1 },
      hard: { people: 9, rocks: 6, speed: 3.7 }
    };

    let boat;
    let people = [];
    let rocks = [];
    let score = 0;
    let over = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function reset() {
      boat = { x: W / 2 - 20, y: H - 44, w: 42, h: 24 };
      people = [];
      rocks = [];
      score = 0;
      over = false;

      for (let i = 0; i < cfg().people; i++) {
        people.push({ x: 40 + Math.random() * (W - 80), y: 30 + Math.random() * (H - 220), alive: true });
      }

      for (let i = 0; i < cfg().rocks; i++) {
        rocks.push({ x: 40 + i * 120, y: 90 + (i % 3) * 90, vx: i % 2 ? 1.4 : -1.4 });
      }

      render();
    }

    function intersects(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function update() {
      if (over) return;
      const s = cfg().speed;
      if (keys.left) boat.x -= s;
      if (keys.right) boat.x += s;
      if (keys.up) boat.y -= s;
      if (keys.down) boat.y += s;
      boat.x = Math.max(0, Math.min(W - boat.w, boat.x));
      boat.y = Math.max(0, Math.min(H - boat.h, boat.y));

      for (const r of rocks) {
        r.x += r.vx;
        if (r.x < 0 || r.x > W - 24) r.vx *= -1;
        if (intersects(boat, { x: r.x, y: r.y, w: 24, h: 24 })) {
          score = Math.max(0, score - 12);
        }
      }

      for (const p of people) {
        if (!p.alive) continue;
        if (intersects(boat, { x: p.x, y: p.y, w: 18, h: 18 })) {
          p.alive = false;
          score += 20;
        }
      }

      if (people.every(p => !p.alive)) {
        score += 40;
        over = true;
      }
    }

    function render() {
      sea.innerHTML = '';

      for (const p of people) {
        if (!p.alive) continue;
        const el = document.createElement('div');
        el.className = 'person';
        el.style.left = `${p.x}px`;
        el.style.top = `${p.y}px`;
        sea.appendChild(el);
      }

      for (const r of rocks) {
        const el = document.createElement('div');
        el.className = 'rock';
        el.style.left = `${r.x}px`;
        el.style.top = `${r.y}px`;
        sea.appendChild(el);
      }

      const me = document.createElement('div');
      me.className = 'boat';
      me.style.left = `${boat.x}px`;
      me.style.top = `${boat.y}px`;
      sea.appendChild(me);

      hud.textContent = over
        ? `Rescue complete (${levelSelect.value})! Score: ${score}`
        : `Level: ${levelSelect.value} | Score: ${score} | Swimmers left: ${people.filter(p => p.alive).length}`;
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = true;
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = true;
    });

    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = false;
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = false;
    });

    newRunButton.addEventListener('click', reset);
    levelSelect.addEventListener('change', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
