<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Bike Trial</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111b2a; color: #eef7ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(94vw, 800px); text-align: center; }
    a { color: #9ed8ff; }
    canvas { border: 1px solid #90bfdc; border-radius: 10px; background: linear-gradient(#324e70, #1a2a3d); }
    select, button { border: 1px solid #97c6e4; border-radius: 8px; background: #274f73; color: #eef9ff; padding: 7px 10px; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-2-racing.html">Page 2: Racing</a></p>
    <h1>Bike Trial</h1>
    <p>Hop across ramps. Left/Right to move, Up to jump.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="restart" type="button">Restart</button>
    </p>
    <canvas id="c" width="760" height="420"></canvas>
    <p id="hud"></p>
  </div>
  <script>
    const c = document.getElementById('c');
    const g = c.getContext('2d');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const restartButton = document.getElementById('restart');

    const levels = {
      easy: { gap: 85, speed: 2.4, gravity: 0.34, jump: -7.2 },
      medium: { gap: 110, speed: 2.8, gravity: 0.37, jump: -7.6 },
      hard: { gap: 135, speed: 3.2, gravity: 0.4, jump: -8.2 }
    };

    const keys = { l: false, r: false, up: false };
    let bike = { x: 90, y: 290, w: 34, h: 18, vy: 0, onGround: false };
    let platforms = [];
    let distance = 0;
    let over = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function reset() {
      const lv = cfg();
      bike = { x: 90, y: 290, w: 34, h: 18, vy: 0, onGround: false };
      platforms = [
        { x: 0, y: 320, w: 190, h: 20 },
        { x: 230, y: 300, w: 150, h: 20 },
        { x: 430, y: 325, w: 170, h: 20 },
        { x: 650, y: 295, w: 150, h: 20 }
      ];
      distance = 0;
      over = false;
      for (let i = 0; i < 8; i++) spawnPlatform(c.width + i * 140, lv.gap);
    }

    function spawnPlatform(xStart, gap) {
      const y = 260 + Math.random() * 95;
      const w = 120 + Math.random() * 90;
      platforms.push({ x: xStart + gap, y, w, h: 18 });
    }

    function update() {
      if (over) return;
      const lv = cfg();

      if (keys.l) bike.x -= 2.6;
      if (keys.r) bike.x += 2.8;
      bike.x = Math.max(20, Math.min(220, bike.x));

      if (keys.up && bike.onGround) {
        bike.vy = lv.jump;
        bike.onGround = false;
      }

      bike.vy += lv.gravity;
      bike.y += bike.vy;
      bike.onGround = false;

      for (const p of platforms) {
        if (bike.x + bike.w > p.x && bike.x < p.x + p.w && bike.y + bike.h >= p.y && bike.y + bike.h <= p.y + 14 && bike.vy >= 0) {
          bike.y = p.y - bike.h;
          bike.vy = 0;
          bike.onGround = true;
        }
      }

      for (let i = platforms.length - 1; i >= 0; i--) {
        platforms[i].x -= lv.speed;
        if (platforms[i].x + platforms[i].w < -40) {
          platforms.splice(i, 1);
          const lastX = platforms.length ? platforms[platforms.length - 1].x : c.width;
          spawnPlatform(lastX + 120, lv.gap);
          distance += 12;
        }
      }

      if (bike.y > c.height + 30) over = true;
    }

    function draw() {
      g.clearRect(0, 0, c.width, c.height);
      g.fillStyle = '#5e89b2';
      g.fillRect(0, 0, c.width, c.height);

      g.fillStyle = '#233447';
      for (const p of platforms) g.fillRect(p.x, p.y, p.w, p.h);

      g.fillStyle = '#66d3a4';
      g.fillRect(bike.x, bike.y, bike.w, bike.h);
      g.fillStyle = '#0f151b';
      g.beginPath(); g.arc(bike.x + 6, bike.y + bike.h + 2, 6, 0, Math.PI * 2); g.fill();
      g.beginPath(); g.arc(bike.x + bike.w - 6, bike.y + bike.h + 2, 6, 0, Math.PI * 2); g.fill();

      hud.textContent = over
        ? `Crash (${levelSelect.value})! Distance: ${distance}m. Press Restart.`
        : `Level: ${levelSelect.value} | Distance: ${distance}m`;
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    addEventListener('keydown', e => {
      if (e.code === 'ArrowLeft') keys.l = true;
      if (e.code === 'ArrowRight') keys.r = true;
      if (e.code === 'ArrowUp') { keys.up = true; e.preventDefault(); }
    });
    addEventListener('keyup', e => {
      if (e.code === 'ArrowLeft') keys.l = false;
      if (e.code === 'ArrowRight') keys.r = false;
      if (e.code === 'ArrowUp') { keys.up = false; e.preventDefault(); }
    });

    restartButton.addEventListener('click', reset);
    levelSelect.addEventListener('change', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
