<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystal Tunnel 3D</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;overflow:hidden;background:radial-gradient(circle at 50% 50%,#351d73,#080313 62%);font-family:Segoe UI,sans-serif;color:#e8ddff}
    #hud{position:fixed;left:12px;top:12px;background:rgba(24,8,52,.68);padding:8px 10px;border:1px solid rgba(230,171,255,.52);border-radius:10px;font-weight:700}
    #ship{position:fixed;bottom:75px;left:50%;width:68px;height:72px;transform:translateX(-50%);background:linear-gradient(180deg,#e2a9ff,#7234ff);clip-path:polygon(50% 0,95% 100%,5% 100%);filter:drop-shadow(0 0 14px #d5a7ff)}
    .crys{position:fixed;width:58px;height:68px;background:linear-gradient(150deg,#9cf8ff,#2f8eff);clip-path:polygon(50% 0,90% 35%,68% 100%,32% 100%,10% 35%);border:1px solid rgba(255,255,255,.6)}
    #note{position:fixed;right:12px;top:12px;background:rgba(24,8,52,.68);padding:8px 10px;border-radius:10px;border:1px solid rgba(230,171,255,.52)}
    #end{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(5,8,18,.78)}
    #endBox{background:rgba(22,8,44,.95);border:1px solid rgba(231,167,255,.5);padding:18px;border-radius:12px;text-align:center}
    button{cursor:pointer;border:none;padding:9px 14px;border-radius:10px;background:#d675ff;color:#1c0530;font-weight:800}
    @media (max-width:780px){#note{top:auto;bottom:12px;right:12px;font-size:12px;padding:6px 8px}}
  </style>
</head>
<body>
  <div id="hud">Score: 0 | Shield: 100</div>
  <div id="note">WASD / Arrows to dodge crystals</div>
  <div id="ship"></div>
  <div id="end"><div id="endBox"><h2 id="endText">Game Over</h2><button onclick="location.reload()">Play Again</button></div></div>

  <script>
    let x=window.innerWidth/2,y=window.innerHeight-120;
    let score=0,shield=100,alive=true,t=0;
    const keys={};
    const ship=document.getElementById('ship');
    const hud=document.getElementById('hud');
    const crystals=[];

    document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
    document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

    function spawn(){
      const c=document.createElement('div');
      c.className='crys';
      c.dataset.x=String(Math.random()*(window.innerWidth-80)+20);
      c.dataset.y='-90';
      c.dataset.v=String(4+Math.random()*3+score/700);
      c.style.left=c.dataset.x+'px';
      c.style.top='-90px';
      document.body.appendChild(c);
      crystals.push(c);
    }

    function updateShip(){
      if(keys['a']||keys['arrowleft']) x-=7;
      if(keys['d']||keys['arrowright']) x+=7;
      if(keys['w']||keys['arrowup']) y-=5;
      if(keys['s']||keys['arrowdown']) y+=5;
      x=Math.max(30,Math.min(window.innerWidth-30,x));
      y=Math.max(window.innerHeight-280,Math.min(window.innerHeight-60,y));
      ship.style.left=(x-34)+'px';
      ship.style.top=(y-36)+'px';
    }

    window.addEventListener('resize',()=>{
      x=Math.max(30,Math.min(window.innerWidth-30,x));
      y=Math.max(window.innerHeight-280,Math.min(window.innerHeight-60,y));
      updateShip();
    });

    function endGame(){
      alive=false;
      hud.textContent=`Game Over | Score: ${score}`;
      document.getElementById('endText').textContent=`Game Over - Score: ${score}`;
      document.getElementById('end').style.display='flex';
    }

    function loop(){
      if(!alive) return;
      t++;
      if(t%30===0) spawn();
      score+=1;
      updateShip();

      for(let i=crystals.length-1;i>=0;i--){
        const c=crystals[i];
        const yv=Number(c.dataset.y)+Number(c.dataset.v);
        c.dataset.y=String(yv);
        c.style.top=yv+'px';
        const cx=Number(c.dataset.x);
        if(Math.abs(cx-x)<48 && Math.abs(yv-y)<58){
          shield-=20;
          c.remove();crystals.splice(i,1);
          if(shield<=0){endGame();return;}
        } else if(yv>window.innerHeight+90){
          c.remove();crystals.splice(i,1);
        }
      }

      hud.textContent=`Score: ${score} | Shield: ${shield}`;
      requestAnimationFrame(loop);
    }
    loop();
  </script>
  <script src="../player-system.js"></script>
</body>
</html>
