<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Target Blast</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Trebuchet MS, sans-serif; background: #0c1b2e; color: #f0f8ff; }
    .shell { width: min(92vw, 760px); text-align: center; }
    a { color: #9ed8ff; }
    #arena { margin: 8px auto; width: min(92vw, 640px); height: 420px; border: 1px solid #88bddf; border-radius: 10px; background: linear-gradient(#112743, #0b1a2e); position: relative; overflow: hidden; }
    .target { width: 42px; height: 42px; border-radius: 999px; background: #ff8f86; position: absolute; cursor: pointer; border: 2px solid #ffd6d1; }
    button { border: 1px solid #96c8e5; border-radius: 8px; padding: 8px 12px; background: #245074; color: #eef9ff; cursor: pointer; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-1-shooting.html">P1 Shooting</a> | <a href="../page-2-racing.html">P2 Racing</a> | <a href="../page-3-puzzle.html">P3 Puzzle</a> | <a href="../page-4-arcade.html">P4 Arcade</a> | <a href="../page-5-realistic.html">P5 Realistic</a> | <a href="../page-6-party.html">P6 Party</a></p>
    <h1>Target Blast</h1>
    <p>Click targets quickly. 30 seconds per round.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
    </p>
    <button id="start">Start Round</button>
    <div id="arena"></div>
    <p id="hud">Score: 0 | Time: 30</p>
  </div>
  <script>
    const arena = document.getElementById('arena');
    const hud = document.getElementById('hud');
    const start = document.getElementById('start');
    const levelSelect = document.getElementById('level');
    const levels = {
      easy: { roundTime: 35, spawnRate: 650, targetLife: 1400 },
      medium: { roundTime: 30, spawnRate: 450, targetLife: 1100 },
      hard: { roundTime: 25, spawnRate: 300, targetLife: 850 }
    };
    let score = 0;
    let timeLeft = 30;
    let tick = null;
    let spawn = null;
    let currentLevel = levels.medium;

    function spawnTarget() {
      const t = document.createElement('button');
      t.className = 'target';
      t.style.left = Math.random() * (arena.clientWidth - 44) + 'px';
      t.style.top = Math.random() * (arena.clientHeight - 44) + 'px';
      t.onclick = () => {
        score += 1;
        t.remove();
        hud.textContent = `Score: ${score} | Time: ${timeLeft}`;
      };
      arena.appendChild(t);
      setTimeout(() => t.remove(), currentLevel.targetLife);
    }

    function stopRound() {
      clearInterval(tick);
      clearInterval(spawn);
      tick = null;
      spawn = null;
      hud.textContent = `Round Over (${levelSelect.value}). Score: ${score}. Press Start Round to play again.`;
    }

    function startRound() {
      currentLevel = levels[levelSelect.value] || levels.medium;
      score = 0;
      timeLeft = currentLevel.roundTime;
      arena.innerHTML = '';
      hud.textContent = `Score: ${score} | Time: ${timeLeft}`;
      clearInterval(tick);
      clearInterval(spawn);
      tick = setInterval(() => {
        timeLeft -= 1;
        hud.textContent = `Level: ${levelSelect.value} | Score: ${score} | Time: ${timeLeft}`;
        if (timeLeft <= 0) stopRound();
      }, 1000);
      spawn = setInterval(spawnTarget, currentLevel.spawnRate);
    }

    start.addEventListener('click', startRound);
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
