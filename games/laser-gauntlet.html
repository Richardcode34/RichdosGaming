<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Laser Gauntlet</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #091a2d; color: #eef8ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(94vw, 780px); text-align: center; }
    a { color: #9ed8ff; }
    canvas { border: 1px solid #8dc0dd; border-radius: 10px; background: linear-gradient(#102746, #0a1626); }
    select, button { border: 1px solid #96c8e5; border-radius: 8px; background: #234d72; color: #eef9ff; padding: 7px 10px; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-1-shooting.html">P1 Shooting</a> | <a href="../page-2-racing.html">P2 Racing</a> | <a href="../page-3-puzzle.html">P3 Puzzle</a> | <a href="../page-4-arcade.html">P4 Arcade</a> | <a href="../page-5-realistic.html">P5 Realistic</a> | <a href="../page-6-party.html">P6 Party</a></p>
    <h1>Laser Gauntlet</h1>
    <p>Move with A/D or Left/Right. Shoot with Space. Survive enemy waves.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newGame" type="button">New Game</button>
    </p>
    <canvas id="c" width="720" height="460"></canvas>
    <p id="hud"></p>
  </div>
  <script>
    const c = document.getElementById('c');
    const g = c.getContext('2d');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newGameButton = document.getElementById('newGame');

    const levels = {
      easy: { enemyEvery: 70, enemySpeed: 1.2, enemyHp: 1 },
      medium: { enemyEvery: 48, enemySpeed: 1.8, enemyHp: 2 },
      hard: { enemyEvery: 34, enemySpeed: 2.4, enemyHp: 3 }
    };

    const keys = { l: false, r: false, fire: false };
    const player = { x: 340, y: 410, w: 44, h: 26, cd: 0 };
    const shots = [];
    const enemies = [];

    let score = 0;
    let tick = 0;
    let over = false;

    function levelCfg() { return levels[levelSelect.value] || levels.medium; }

    function reset() {
      score = 0;
      tick = 0;
      over = false;
      shots.length = 0;
      enemies.length = 0;
      player.x = 340;
      player.cd = 0;
    }

    function overlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function spawnEnemy() {
      const cfg = levelCfg();
      enemies.push({
        x: Math.random() * (c.width - 36),
        y: -28,
        w: 36,
        h: 26,
        hp: cfg.enemyHp,
        vy: cfg.enemySpeed + Math.random() * 0.8
      });
    }

    function update() {
      if (over) return;
      const cfg = levelCfg();

      if (keys.l) player.x -= 5;
      if (keys.r) player.x += 5;
      player.x = Math.max(0, Math.min(c.width - player.w, player.x));

      if (player.cd > 0) player.cd -= 1;
      if (keys.fire && player.cd <= 0) {
        shots.push({ x: player.x + player.w / 2 - 2, y: player.y - 8, w: 4, h: 10, vy: 7 });
        player.cd = 10;
      }

      tick += 1;
      if (tick % cfg.enemyEvery === 0) spawnEnemy();

      for (let i = shots.length - 1; i >= 0; i--) {
        shots[i].y -= shots[i].vy;
        if (shots[i].y < -15) shots.splice(i, 1);
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += e.vy;

        if (e.y > c.height || overlap(e, player)) {
          over = true;
          continue;
        }

        for (let j = shots.length - 1; j >= 0; j--) {
          if (overlap(e, shots[j])) {
            shots.splice(j, 1);
            e.hp -= 1;
            if (e.hp <= 0) {
              enemies.splice(i, 1);
              score += 12;
            }
            break;
          }
        }
      }
    }

    function draw() {
      g.clearRect(0, 0, c.width, c.height);
      g.fillStyle = '#67d8ff';
      g.fillRect(player.x, player.y, player.w, player.h);

      g.fillStyle = '#ffe083';
      for (const s of shots) g.fillRect(s.x, s.y, s.w, s.h);

      g.fillStyle = '#ff8f8f';
      for (const e of enemies) g.fillRect(e.x, e.y, e.w, e.h);

      hud.textContent = over
        ? `Game Over (${levelSelect.value}). Score: ${score}. Press New Game.`
        : `Level: ${levelSelect.value} | Score: ${score}`;
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    addEventListener('keydown', e => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.l = true;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.r = true;
      if (e.code === 'Space') { keys.fire = true; e.preventDefault(); }
    });
    addEventListener('keyup', e => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.l = false;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.r = false;
      if (e.code === 'Space') { keys.fire = false; e.preventDefault(); }
    });

    levelSelect.addEventListener('change', reset);
    newGameButton.addEventListener('click', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
