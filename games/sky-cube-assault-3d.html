<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Cube Assault 3D</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 50% 0,#3e79ff,#06122f 66%);font-family:Tahoma,sans-serif;color:#eef5ff;overflow:hidden}
    #hud{position:fixed;left:12px;top:12px;background:rgba(3,12,24,.72);padding:8px 10px;border:1px solid rgba(169,197,255,.56);border-radius:10px;font-weight:700}
    #cross{position:fixed;left:50%;top:50%;width:22px;height:22px;transform:translate(-50%,-50%)}
    #cross:before,#cross:after{content:'';position:absolute;background:#c8e1ff;box-shadow:0 0 8px #c8e1ff}
    #cross:before{left:10px;top:0;width:2px;height:22px}#cross:after{left:0;top:10px;width:22px;height:2px}
    .cube{position:fixed;width:58px;height:58px;background:linear-gradient(145deg,#ffef9b,#e5692d);border:1px solid rgba(255,255,255,.55);transform:rotateX(58deg) rotateZ(14deg)}
    #msg{position:fixed;right:12px;top:12px;background:rgba(3,12,24,.72);padding:8px 10px;border-radius:10px;border:1px solid rgba(169,197,255,.56)}
    #end{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(5,8,18,.78)}
    #endBox{background:rgba(10,18,35,.95);border:1px solid rgba(139,236,255,.5);padding:18px;border-radius:12px;text-align:center}
    button{cursor:pointer;border:none;padding:9px 14px;border-radius:10px;background:#54d6ff;color:#07253b;font-weight:800}
    @media (max-width:780px){#msg{top:auto;bottom:12px;right:12px;font-size:12px;padding:6px 8px}}
  </style>
</head>
<body>
  <div id="hud">Score: 0 | HP: 5</div>
  <div id="msg">Move mouse + click to blast cubes</div>
  <div id="cross"></div>
  <div id="end"><div id="endBox"><h2 id="endText">Game Over</h2><button onclick="location.reload()">Play Again</button></div></div>

  <script>
    let score=0,hp=5,tick=0,alive=true;
    const cubes=[];
    const hud=document.getElementById('hud');

    function spawn(){
      const c=document.createElement('div');
      c.className='cube';
      c.dataset.x=String(Math.random()*Math.max(40,window.innerWidth-70));
      c.dataset.y='-80';
      c.dataset.v=String(Math.min(7.4, 2+Math.random()*2.8+score/700));
      c.style.left=c.dataset.x+'px';
      c.style.top='-80px';
      document.body.appendChild(c);
      cubes.push(c);
    }

    function updateHud(){hud.textContent=`Score: ${score} | HP: ${hp}`;}
    function endGame(){
      alive=false;
      hud.textContent=`Game Over | Score: ${score}`;
      document.getElementById('endText').textContent=`Game Over - Score: ${score}`;
      document.getElementById('end').style.display='flex';
    }

    document.addEventListener('click',e=>{
      if(!alive) return;
      let hit=false;
      for(let i=cubes.length-1;i>=0;i--){
        const c=cubes[i];
        const r=c.getBoundingClientRect();
        if(e.clientX>=r.left && e.clientX<=r.right && e.clientY>=r.top && e.clientY<=r.bottom){
          score+=25;
          c.remove();
          cubes.splice(i,1);
          hit=true;
          break;
        }
      }
      if(!hit){score=Math.max(0,score-4);} 
      updateHud();
    });

    function loop(){
      if(!alive) return;
      tick++;
      if(tick%40===0) spawn();
      for(let i=cubes.length-1;i>=0;i--){
        const c=cubes[i];
        const y=Number(c.dataset.y)+Number(c.dataset.v);
        c.dataset.y=String(y);
        c.style.top=y+'px';
        if(y>window.innerHeight){
          c.remove();
          cubes.splice(i,1);
          hp-=1;
          updateHud();
          if(hp<=0){endGame();return;}
        }
      }
      requestAnimationFrame(loop);
    }
    updateHud();
    loop();
  </script>
  <script src="../player-system.js"></script>
</body>
</html>
