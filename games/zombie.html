<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="../graphics.css" />
	<title>Zombie Apocalypse Shooter</title>
	<style>
		body { margin: 0; padding-bottom: 76px; background: radial-gradient(circle at 20% 10%, #3a1f1f, #110b10 58%); color: #f6f8ff; font-family: Trebuchet MS, sans-serif; }
		.shell { width: min(96vw, 1080px); margin: 16px auto; }
		.top { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
		.top a { color: #c3e8ff; font-weight: 700; }
		.row { display: grid; grid-template-columns: minmax(250px, 340px) 1fr; gap: 12px; }
		.panel { background: linear-gradient(180deg, rgba(32, 14, 18, 0.94), rgba(17, 9, 13, 0.94)); border: 1px solid rgba(255, 158, 158, 0.45); border-radius: 10px; padding: 10px; min-height: 0; }
		#startMenu h2 { margin: 0 0 8px; }
		.grid { display: grid; gap: 8px; }
		label { display: block; font-size: 12px; color: #ffd5d5; }
		select, button { width: 100%; border: 1px solid rgba(255, 187, 187, 0.5); border-radius: 8px; background: #3f2027; color: #fff0f0; padding: 8px; font-weight: 700; }
		button:hover { filter: brightness(1.08); }
		#saveStats { font-size: 12px; color: #ffe7cc; min-height: 34px; }
		#gameCanvas { width: 100%; height: auto; max-height: min(72vh, 640px); background: radial-gradient(circle at 50% 20%, #2a1d24, #0f0a0f 64%); border: 1px solid rgba(183, 225, 255, 0.35); border-radius: 10px; }
		.tutorial { position: fixed; inset: 0; background: rgba(9, 5, 7, 0.78); display: grid; place-items: center; z-index: 9998; }
		.tutorial-card { width: min(92vw, 640px); background: #1f1420; border: 1px solid rgba(255, 190, 190, 0.55); border-radius: 10px; padding: 16px; }
		.tutorial-card h3 { margin: 0 0 8px; }
		.tutorial-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
		.hidden { display: none !important; }
		@media (max-width: 940px) {
			.row { grid-template-columns: 1fr; }
			.top { flex-direction: column; align-items: flex-start; }
			#startMenu { max-height: 44vh; overflow: auto; }
		}
	</style>
</head>
<body>
	<div class="shell">
		<div class="top">
			<div><a href="../index.html">Home</a> | <a href="../page-1-shooting.html">Back to Shooting</a></div>
			<div id="saveStats"></div>
		</div>

		<div class="row">
			<aside id="startMenu" class="panel">
				<h2>Mission Prep</h2>
				<div class="grid">
					<div>
						<label for="difficultySelect">Difficulty</label>
						<select id="difficultySelect">
							<option value="rookie">Rookie</option>
							<option value="survivor" selected>Survivor</option>
							<option value="nightmare">Nightmare</option>
						</select>
					</div>

					<div>
						<label for="weaponSelect">Weapon Kit</label>
						<select id="weaponSelect">
							<option value="balanced" selected>Balanced Loadout</option>
							<option value="blaster">Heavy Blaster</option>
							<option value="rapid">Rapid Fire</option>
						</select>
					</div>

					<div>
						<label for="utilitySelect">Utility</label>
						<select id="utilitySelect">
							<option value="medic" selected>Medic Pack</option>
							<option value="engineer">Barrier Engineer</option>
							<option value="scavenger">Scavenger</option>
						</select>
					</div>

					<button id="shopWeapon" type="button">Shop: Weapon Boost</button>
					<button id="shopAmmo" type="button">Shop: Ammo Cache</button>
					<button id="shopBarrier" type="button">Shop: Barrier Kit</button>
					<button id="shopLife" type="button">Shop: Extra Life</button>

					<button id="upgradeDamage" type="button">Upgrade Damage</button>
					<button id="upgradeFireRate" type="button">Upgrade Fire Rate</button>
					<button id="upgradeArmor" type="button">Upgrade Armor</button>

					<button id="helpModeToggle" type="button">Help Mode: OFF</button>
					<button id="tutorialToggle" type="button">Tutorial</button>
					<button id="startButton" type="button">Start Mission</button>
					<button id="resetSaveButton" type="button">Reset Save</button>
				</div>
			</aside>

			<section class="panel">
				<canvas id="gameCanvas" width="960" height="540"></canvas>
			</section>
		</div>
	</div>

	<div id="tutorialOverlay" class="tutorial hidden">
		<div class="tutorial-card">
			<h3 id="tutorialTitle">Tutorial</h3>
			<p id="tutorialText">Welcome to Zombie Apocalypse Shooter.</p>
			<p id="tutorialStep">Step 1 / 1</p>
			<div class="tutorial-actions">
				<button id="tutorialNext" type="button">Next</button>
				<button id="tutorialSkip" type="button">Skip</button>
			</div>
		</div>
	</div>

	<script src="zombie.js"></script>
	<script src="../player-system.js"></script>
	<script src="../music-system.js"></script>
</body>
</html>
