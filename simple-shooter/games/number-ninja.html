<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Number Ninja</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b1e34; color: #eef8ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(92vw, 700px); text-align: center; }
    a { color: #9ed8ff; }
    .panel { background: #163250; border: 1px solid #8fc0df; border-radius: 10px; padding: 14px; }
    button, select, input { border: 1px solid #97c6e4; border-radius: 8px; background: #244a6d; color: #eef9ff; padding: 8px 10px; }
    input { width: 130px; text-align: center; }
    .big { font-size: 2rem; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-1-shooting.html">P1 Shooting</a> | <a href="../page-2-racing.html">P2 Racing</a> | <a href="../page-3-puzzle.html">P3 Puzzle</a> | <a href="../page-4-arcade.html">P4 Arcade</a> | <a href="../page-5-realistic.html">P5 Realistic</a> | <a href="../page-6-party.html">P6 Party</a></p>
    <h1>Number Ninja</h1>
    <p>Solve quick math rounds before time runs out.</p>
    <div class="panel">
      <p>
        Level:
        <select id="level">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
        <button id="start" type="button">Start</button>
      </p>
      <p class="big" id="q">Press Start</p>
      <p>
        <input id="answer" type="number" placeholder="Answer" />
        <button id="submit" type="button">Submit</button>
      </p>
      <p id="hud">Score: 0 | Time: 0</p>
    </div>
  </div>
  <script>
    const q = document.getElementById('q');
    const answer = document.getElementById('answer');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const startButton = document.getElementById('start');
    const submitButton = document.getElementById('submit');

    const levels = {
      easy: { max: 20, ops: ['+','-'], time: 45 },
      medium: { max: 50, ops: ['+','-','*'], time: 40 },
      hard: { max: 90, ops: ['+','-','*'], time: 32 }
    };

    let score = 0;
    let timeLeft = 0;
    let timer = null;
    let correct = 0;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function makeQuestion() {
      const c = cfg();
      const a = Math.floor(Math.random() * c.max) + 1;
      const b = Math.floor(Math.random() * c.max) + 1;
      const op = c.ops[Math.floor(Math.random() * c.ops.length)];
      q.textContent = `${a} ${op} ${b} = ?`;
      if (op === '+') correct = a + b;
      if (op === '-') correct = a - b;
      if (op === '*') correct = a * b;
    }

    function refreshHud() {
      hud.textContent = `Level: ${levelSelect.value} | Score: ${score} | Time: ${timeLeft}`;
    }

    function endGame() {
      clearInterval(timer);
      timer = null;
      q.textContent = `Time up! Final score: ${score}`;
    }

    function startGame() {
      const c = cfg();
      score = 0;
      timeLeft = c.time;
      makeQuestion();
      refreshHud();
      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft -= 1;
        refreshHud();
        if (timeLeft <= 0) endGame();
      }, 1000);
      answer.focus();
    }

    function submit() {
      if (!timer) return;
      const value = Number(answer.value);
      if (value === correct) score += 10;
      else score = Math.max(0, score - 2);
      answer.value = '';
      makeQuestion();
      refreshHud();
    }

    startButton.addEventListener('click', startGame);
    submitButton.addEventListener('click', submit);
    answer.addEventListener('keydown', e => { if (e.code === 'Enter') submit(); });
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
