<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Minecraft Skyblock</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(#7fc4ff, #2d6fa8); color: #f2fff6; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(95vw, 940px); text-align: center; }
    a { color: #d9ffd4; }
    #sky { margin: 10px auto; width: min(94vw, 880px); height: 430px; border: 1px solid #b9e5ff; border-radius: 12px; background: linear-gradient(#8ed0ff, #4e95c9); position: relative; overflow: hidden; }
    .island, .player, .orb, .cloud { position: absolute; }
    .island { border-radius: 6px; border: 1px solid rgba(32,58,20,.6); }
    .island.grass { background: #5fa14a; }
    .island.dirt { background: #765236; }
    .player { width: 22px; height: 22px; border-radius: 6px; background: #ffe19e; border: 1px solid #fff7d0; }
    .orb { width: 14px; height: 14px; border-radius: 999px; background: radial-gradient(circle, #fffcc8, #ffd76e); border: 1px solid #f6db8f; }
    .cloud { width: 80px; height: 30px; background: rgba(255,255,255,.45); border-radius: 20px; filter: blur(.3px); }
    button, select { border: 1px solid #cce8d0; border-radius: 8px; background: #356642; color: #eefff1; padding: 8px 10px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-7-minecraft.html">P7 Minecraft</a></p>
    <h1>Minecraft Skyblock</h1>
    <p>Stay on floating islands, collect light orbs, and survive each wave.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newRun" type="button">New Skyblock</button>
    </p>
    <div id="sky"></div>
    <p id="hud"></p>
  </div>

  <script>
    const sky = document.getElementById('sky');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newRunButton = document.getElementById('newRun');

    const W = 880;
    const H = 430;
    const keys = { left: false, right: false, up: false, down: false };

    const levels = {
      easy: { need: 8, speed: 2.8, drain: 0.02 },
      medium: { need: 11, speed: 3.3, drain: 0.03 },
      hard: { need: 14, speed: 3.9, drain: 0.04 }
    };

    let islands = [];
    let orbs = [];
    let clouds = [];
    let player;
    let score = 0;
    let energy = 100;
    let over = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function rectHit(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function reset() {
      islands = [
        { x: 40, y: 290, w: 200, h: 26 },
        { x: 290, y: 230, w: 180, h: 24 },
        { x: 520, y: 260, w: 190, h: 24 },
        { x: 720, y: 185, w: 130, h: 24 }
      ];
      player = { x: 90, y: 265, w: 22, h: 22 };
      orbs = [];
      clouds = [
        { x: 40, y: 45, vx: 0.3 },
        { x: 320, y: 82, vx: 0.22 },
        { x: 640, y: 36, vx: 0.28 }
      ];
      score = 0;
      energy = 100;
      over = false;
      spawnOrb();
      spawnOrb();
    }

    function spawnOrb() {
      const i = islands[Math.floor(Math.random() * islands.length)];
      orbs.push({ x: i.x + 20 + Math.random() * (i.w - 40), y: i.y - 18, w: 14, h: 14, alive: true });
    }

    function update() {
      if (over) return;
      const s = cfg().speed;
      if (keys.left) player.x -= s;
      if (keys.right) player.x += s;
      if (keys.up) player.y -= s;
      if (keys.down) player.y += s;

      player.x = Math.max(0, Math.min(W - player.w, player.x));
      player.y = Math.max(0, Math.min(H - player.h, player.y));

      let onIsland = false;
      for (const isl of islands) {
        const topBand = { x: isl.x, y: isl.y - 4, w: isl.w, h: isl.h + 8 };
        if (rectHit(player, topBand)) {
          onIsland = true;
          break;
        }
      }

      if (!onIsland) {
        energy -= cfg().drain * 6;
      } else {
        energy -= cfg().drain;
      }

      for (const o of orbs) {
        if (!o.alive) continue;
        if (rectHit(player, o)) {
          o.alive = false;
          score += 10;
          energy = Math.min(100, energy + 8);
          spawnOrb();
        }
      }

      for (const c of clouds) {
        c.x += c.vx;
        if (c.x > W + 20) c.x = -90;
      }

      orbs = orbs.filter(o => o.alive);

      if (score >= cfg().need * 10) {
        over = true;
      }
      if (energy <= 0) {
        over = true;
        energy = 0;
      }
    }

    function render() {
      sky.innerHTML = '';

      for (const c of clouds) {
        const el = document.createElement('div');
        el.className = 'cloud';
        el.style.left = `${c.x}px`;
        el.style.top = `${c.y}px`;
        sky.appendChild(el);
      }

      for (const isl of islands) {
        const top = document.createElement('div');
        top.className = 'island grass';
        top.style.left = `${isl.x}px`;
        top.style.top = `${isl.y}px`;
        top.style.width = `${isl.w}px`;
        top.style.height = '10px';
        sky.appendChild(top);

        const dirt = document.createElement('div');
        dirt.className = 'island dirt';
        dirt.style.left = `${isl.x}px`;
        dirt.style.top = `${isl.y + 10}px`;
        dirt.style.width = `${isl.w}px`;
        dirt.style.height = `${isl.h - 10}px`;
        sky.appendChild(dirt);
      }

      for (const o of orbs) {
        const el = document.createElement('div');
        el.className = 'orb';
        el.style.left = `${o.x}px`;
        el.style.top = `${o.y}px`;
        sky.appendChild(el);
      }

      const me = document.createElement('div');
      me.className = 'player';
      me.style.left = `${player.x}px`;
      me.style.top = `${player.y}px`;
      sky.appendChild(me);

      hud.textContent = over
        ? `Skyblock ${energy > 0 ? 'complete' : 'failed'} (${levelSelect.value}) | Score: ${score}`
        : `Level: ${levelSelect.value} | Score: ${score}/${cfg().need * 10} | Energy: ${energy.toFixed(0)}%`;
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = true;
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = true;
    });

    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = false;
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = false;
    });

    newRunButton.addEventListener('click', reset);
    levelSelect.addEventListener('change', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
