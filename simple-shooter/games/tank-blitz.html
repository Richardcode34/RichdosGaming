<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Tank Blitz</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f1c2d; color: #eef8ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(94vw, 820px); text-align: center; }
    a { color: #9ed8ff; }
    canvas { border: 1px solid #8fc0df; border-radius: 10px; background: linear-gradient(#173047, #102032); }
    select, button { border: 1px solid #97c6e4; border-radius: 8px; background: #275074; color: #eef9ff; padding: 7px 10px; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-1-shooting.html">P1 Shooting</a> | <a href="../page-6-party.html">P6 Party</a></p>
    <h1>Tank Blitz</h1>
    <p>Move with A/D or Left/Right. Shoot shells with Space.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newGame" type="button">New Game</button>
    </p>
    <canvas id="c" width="760" height="420"></canvas>
    <p id="hud"></p>
  </div>
  <script>
    const c = document.getElementById('c');
    const g = c.getContext('2d');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newGameButton = document.getElementById('newGame');

    const levels = {
      easy: { spawnEvery: 62, enemySpeed: 1.2, enemyHp: 1 },
      medium: { spawnEvery: 45, enemySpeed: 1.7, enemyHp: 2 },
      hard: { spawnEvery: 31, enemySpeed: 2.2, enemyHp: 3 }
    };

    const keys = { l: false, r: false, shoot: false };
    const tank = { x: 360, y: 370, w: 46, h: 24, cd: 0 };
    const shells = [];
    const enemies = [];

    let score = 0;
    let baseHp = 5;
    let tick = 0;
    let over = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function reset() {
      score = 0;
      baseHp = 5;
      tick = 0;
      over = false;
      shells.length = 0;
      enemies.length = 0;
      tank.x = 360;
      tank.cd = 0;
    }

    function overlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function spawnEnemy() {
      const lv = cfg();
      const w = 34;
      enemies.push({
        x: Math.random() * (c.width - w),
        y: -26,
        w,
        h: 22,
        hp: lv.enemyHp,
        vy: lv.enemySpeed + Math.random() * 0.8
      });
    }

    function update() {
      if (over) return;

      if (keys.l) tank.x -= 4;
      if (keys.r) tank.x += 4;
      tank.x = Math.max(0, Math.min(c.width - tank.w, tank.x));

      if (tank.cd > 0) tank.cd -= 1;
      if (keys.shoot && tank.cd <= 0) {
        shells.push({ x: tank.x + tank.w / 2 - 3, y: tank.y - 10, w: 6, h: 12, vy: 7 });
        tank.cd = 10;
      }

      tick += 1;
      if (tick % cfg().spawnEvery === 0) spawnEnemy();

      for (let i = shells.length - 1; i >= 0; i--) {
        shells[i].y -= shells[i].vy;
        if (shells[i].y < -20) shells.splice(i, 1);
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += e.vy;

        if (e.y > c.height - 28) {
          baseHp -= 1;
          enemies.splice(i, 1);
          if (baseHp <= 0) over = true;
          continue;
        }

        for (let j = shells.length - 1; j >= 0; j--) {
          if (overlap(e, shells[j])) {
            shells.splice(j, 1);
            e.hp -= 1;
            if (e.hp <= 0) {
              enemies.splice(i, 1);
              score += 12;
            }
            break;
          }
        }
      }
    }

    function draw() {
      g.clearRect(0, 0, c.width, c.height);
      g.fillStyle = '#213849';
      g.fillRect(0, c.height - 26, c.width, 26);

      g.fillStyle = '#63d6a2';
      g.fillRect(tank.x, tank.y, tank.w, tank.h);
      g.fillStyle = '#c9efff';
      g.fillRect(tank.x + tank.w / 2 - 3, tank.y - 8, 6, 8);

      g.fillStyle = '#ffd786';
      for (const s of shells) g.fillRect(s.x, s.y, s.w, s.h);

      g.fillStyle = '#ff988d';
      for (const e of enemies) g.fillRect(e.x, e.y, e.w, e.h);

      hud.textContent = over
        ? `Game Over (${levelSelect.value}). Score: ${score}`
        : `Level: ${levelSelect.value} | Score: ${score} | Base HP: ${baseHp}`;
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    addEventListener('keydown', e => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.l = true;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.r = true;
      if (e.code === 'Space') { keys.shoot = true; e.preventDefault(); }
      if (e.code === 'KeyR') reset();
    });
    addEventListener('keyup', e => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.l = false;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.r = false;
      if (e.code === 'Space') { keys.shoot = false; e.preventDefault(); }
    });

    levelSelect.addEventListener('change', reset);
    newGameButton.addEventListener('click', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
