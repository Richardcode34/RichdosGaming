<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Pattern Guard</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f2137; color: #eef8ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(92vw, 740px); text-align: center; }
    a { color: #9ed8ff; }
    .pad { margin: 10px auto; width: min(92vw, 520px); display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .tile { height: 120px; border: none; border-radius: 12px; cursor: pointer; opacity: 0.8; }
    .tile.active { opacity: 1; box-shadow: 0 0 0 3px rgba(255,255,255,.65) inset; }
    button, select { border: 1px solid #97c6e4; border-radius: 8px; background: #275074; color: #eef9ff; padding: 8px 10px; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-3-puzzle.html">P3 Puzzle</a> | <a href="../page-6-party.html">P6 Party</a></p>
    <h1>Pattern Guard</h1>
    <p>Remember and repeat the color pattern.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="start" type="button">Start</button>
    </p>
    <div class="pad" id="pad">
      <button class="tile" data-id="0" style="background:#ff8f8f"></button>
      <button class="tile" data-id="1" style="background:#ffd27a"></button>
      <button class="tile" data-id="2" style="background:#71d7ff"></button>
      <button class="tile" data-id="3" style="background:#7ef2b2"></button>
    </div>
    <p id="hud">Score: 0</p>
  </div>
  <script>
    const levelSelect = document.getElementById('level');
    const startBtn = document.getElementById('start');
    const hud = document.getElementById('hud');
    const tiles = Array.from(document.querySelectorAll('.tile'));

    const levels = {
      easy: { flash: 520 },
      medium: { flash: 380 },
      hard: { flash: 260 }
    };

    let pattern = [];
    let user = [];
    let score = 0;
    let playingBack = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function setTile(id, on) {
      const t = tiles[id];
      if (!t) return;
      t.classList.toggle('active', !!on);
    }

    function nextStep() {
      pattern.push(Math.floor(Math.random() * 4));
      user = [];
      playback();
    }

    function playback() {
      playingBack = true;
      let i = 0;
      const delay = cfg().flash;

      const timer = setInterval(() => {
        if (i > 0) setTile(pattern[i - 1], false);
        if (i >= pattern.length) {
          clearInterval(timer);
          playingBack = false;
          return;
        }
        setTile(pattern[i], true);
        i += 1;
      }, delay);
    }

    function fail() {
      hud.textContent = `Game Over (${levelSelect.value}). Score: ${score}`;
      pattern = [];
      user = [];
      playingBack = false;
    }

    function onPress(id) {
      if (playingBack || !pattern.length) return;
      user.push(id);

      const idx = user.length - 1;
      if (user[idx] !== pattern[idx]) {
        fail();
        return;
      }

      if (user.length === pattern.length) {
        score += 10;
        hud.textContent = `Level: ${levelSelect.value} | Score: ${score}`;
        setTimeout(nextStep, 300);
      }
    }

    tiles.forEach((t) => {
      t.addEventListener('click', () => {
        const id = Number(t.dataset.id);
        setTile(id, true);
        setTimeout(() => setTile(id, false), 140);
        onPress(id);
      });
    });

    startBtn.addEventListener('click', () => {
      score = 0;
      pattern = [];
      user = [];
      hud.textContent = `Level: ${levelSelect.value} | Score: ${score}`;
      nextStep();
    });

    levelSelect.addEventListener('change', () => {
      score = 0;
      pattern = [];
      user = [];
      hud.textContent = 'Score: 0';
    });
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
