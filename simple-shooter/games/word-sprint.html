<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Word Sprint</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #12223a; color: #eef8ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(92vw, 760px); text-align: center; }
    a { color: #9ed8ff; }
    .panel { background: rgba(15,36,58,.9); border: 1px solid rgba(163,225,255,.5); border-radius: 12px; padding: 14px; }
    .word { font-size: 2rem; margin: 10px 0; }
    input, select, button { border: 1px solid #97c6e4; border-radius: 8px; background: #254d71; color: #eef9ff; padding: 8px 10px; }
    input { width: min(80vw, 320px); }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-3-puzzle.html">P3 Puzzle</a> | <a href="../page-6-party.html">P6 Party</a></p>
    <h1>Word Sprint</h1>
    <p>Type words fast before timer ends.</p>
    <div class="panel">
      <p>
        Level:
        <select id="level">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
        <button id="start" type="button">Start</button>
      </p>
      <p id="word" class="word">Press Start</p>
      <p>
        <input id="input" type="text" placeholder="Type here" />
        <button id="submit" type="button">Submit</button>
      </p>
      <p id="hud">Score: 0 | Time: 0</p>
    </div>
  </div>
  <script>
    const words = ['galaxy','rocket','builder','zombie','adventure','street','memory','target','creator','coding','sniper','matrix','dragon','victory','speed'];
    const levels = {
      easy: { time: 45, points: 8 },
      medium: { time: 35, points: 10 },
      hard: { time: 28, points: 12 }
    };

    const levelSelect = document.getElementById('level');
    const startBtn = document.getElementById('start');
    const submitBtn = document.getElementById('submit');
    const wordEl = document.getElementById('word');
    const input = document.getElementById('input');
    const hud = document.getElementById('hud');

    let score = 0;
    let timeLeft = 0;
    let timer = null;
    let currentWord = '';

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function pickWord() {
      currentWord = words[Math.floor(Math.random() * words.length)];
      wordEl.textContent = currentWord;
    }

    function refresh() {
      hud.textContent = timer
        ? `Level: ${levelSelect.value} | Score: ${score} | Time: ${timeLeft}`
        : `Round Over. Level: ${levelSelect.value} | Score: ${score}`;
    }

    function start() {
      const c = cfg();
      score = 0;
      timeLeft = c.time;
      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft -= 1;
        refresh();
        if (timeLeft <= 0) {
          clearInterval(timer);
          timer = null;
          refresh();
        }
      }, 1000);
      pickWord();
      input.value = '';
      input.focus();
      refresh();
    }

    function submit() {
      if (!timer) return;
      if (input.value.trim().toLowerCase() === currentWord) {
        score += cfg().points;
      } else {
        score = Math.max(0, score - 2);
      }
      input.value = '';
      pickWord();
      refresh();
    }

    startBtn.addEventListener('click', start);
    submitBtn.addEventListener('click', submit);
    levelSelect.addEventListener('change', start);
    input.addEventListener('keydown', e => { if (e.code === 'Enter') submit(); });
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
