<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Minecraft Parkour</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #1f311f; color: #effde9; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(95vw, 920px); text-align: center; }
    a { color: #b8ffcf; }
    #world { margin: 10px auto; width: min(94vw, 860px); height: 420px; border: 1px solid #a4d9af; border-radius: 10px; background: linear-gradient(#79b45b, #497238); position: relative; overflow: hidden; }
    .player, .plat, .coin, .lava { position: absolute; }
    .player { width: 24px; height: 24px; border-radius: 6px; background: #ffe29d; border: 1px solid #fff6d0; }
    .plat { height: 16px; background: #6e5033; border: 1px solid #927253; border-radius: 4px; }
    .coin { width: 14px; height: 14px; border-radius: 999px; background: #fff184; border: 1px solid #f5d45e; }
    .lava { height: 18px; background: linear-gradient(180deg, #ff944d, #cf3d21); }
    button, select { border: 1px solid #b6debf; border-radius: 8px; background: #365c3f; color: #effde9; padding: 8px 10px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-7-minecraft.html">P7 Minecraft</a></p>
    <h1>Minecraft Parkour</h1>
    <p>Jump across blocks, collect coins, and avoid lava. Keys: A/D + Space.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newRun" type="button">New Run</button>
    </p>
    <div id="world"></div>
    <p id="hud"></p>
  </div>

  <script>
    const world = document.getElementById('world');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newRunButton = document.getElementById('newRun');

    const W = 860;
    const H = 420;
    const keys = { left: false, right: false, jump: false };

    const levels = {
      easy: { speed: 3.4, jump: 9.5, need: 7 },
      medium: { speed: 3.9, jump: 10.2, need: 9 },
      hard: { speed: 4.4, jump: 11.0, need: 12 }
    };

    let player;
    let plats = [];
    let coins = [];
    let lava = [];
    let score = 0;
    let over = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function intersects(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function setupWorld() {
      plats = [
        { x: 0, y: 388, w: 860 },
        { x: 90, y: 325, w: 160 },
        { x: 320, y: 280, w: 160 },
        { x: 540, y: 235, w: 170 },
        { x: 245, y: 185, w: 120 },
        { x: 470, y: 145, w: 130 }
      ];
      coins = [];
      lava = [{ x: 0, y: 402, w: 860, h: 18 }];
      for (let i = 1; i < plats.length; i++) {
        const p = plats[i];
        coins.push({ x: p.x + Math.max(12, p.w / 2 - 7), y: p.y - 20, w: 14, h: 14, alive: true });
      }
    }

    function reset() {
      player = { x: 20, y: 356, w: 24, h: 24, vx: 0, vy: 0, onGround: false };
      score = 0;
      over = false;
      setupWorld();
    }

    function update() {
      if (over) return;
      const c = cfg();

      player.vx = 0;
      if (keys.left) player.vx = -c.speed;
      if (keys.right) player.vx = c.speed;
      if (keys.jump && player.onGround) {
        player.vy = -c.jump;
        player.onGround = false;
      }

      player.vy += 0.45;
      player.x += player.vx;
      player.y += player.vy;

      player.x = Math.max(0, Math.min(W - player.w, player.x));

      player.onGround = false;
      for (const p of plats) {
        const box = { x: p.x, y: p.y, w: p.w, h: 16 };
        if (intersects(player, box) && player.vy >= 0 && (player.y + player.h - player.vy) <= p.y + 2) {
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
        }
      }

      if (player.y > H + 20) {
        over = true;
        return;
      }

      for (const l of lava) {
        if (intersects(player, l)) {
          over = true;
          return;
        }
      }

      for (const cItem of coins) {
        if (!cItem.alive) continue;
        if (intersects(player, cItem)) {
          cItem.alive = false;
          score += 12;
        }
      }

      if (coins.filter(cn => cn.alive).length === 0 || score >= cfg().need * 12) {
        over = true;
      }
    }

    function render() {
      world.innerHTML = '';

      for (const p of plats) {
        const el = document.createElement('div');
        el.className = 'plat';
        el.style.left = `${p.x}px`;
        el.style.top = `${p.y}px`;
        el.style.width = `${p.w}px`;
        world.appendChild(el);
      }

      for (const cItem of coins) {
        if (!cItem.alive) continue;
        const el = document.createElement('div');
        el.className = 'coin';
        el.style.left = `${cItem.x}px`;
        el.style.top = `${cItem.y}px`;
        world.appendChild(el);
      }

      for (const l of lava) {
        const el = document.createElement('div');
        el.className = 'lava';
        el.style.left = `${l.x}px`;
        el.style.top = `${l.y}px`;
        el.style.width = `${l.w}px`;
        world.appendChild(el);
      }

      const me = document.createElement('div');
      me.className = 'player';
      me.style.left = `${player.x}px`;
      me.style.top = `${player.y}px`;
      world.appendChild(me);

      hud.textContent = over
        ? `Run complete (${levelSelect.value}) | Score: ${score}`
        : `Level: ${levelSelect.value} | Score: ${score} | Coins left: ${coins.filter(cn => cn.alive).length}`;
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
      if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.jump = true;
    });

    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
      if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.jump = false;
    });

    newRunButton.addEventListener('click', reset);
    levelSelect.addEventListener('change', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
