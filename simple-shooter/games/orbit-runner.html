<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Orbit Runner</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0e1a2a; color: #eef8ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(94vw, 800px); text-align: center; }
    a { color: #9ed8ff; }
    canvas { border: 1px solid #8fc0df; border-radius: 10px; background: radial-gradient(circle at 50% 25%, #223f5f, #0a1624 70%); }
    select, button { border: 1px solid #97c6e4; border-radius: 8px; background: #275074; color: #eef9ff; padding: 7px 10px; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-4-arcade.html">P4 Arcade</a> | <a href="../page-5-realistic.html">P5 Realistic</a></p>
    <h1>Orbit Runner</h1>
    <p>Fly around the core and avoid incoming meteors. Left/Right to rotate.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newRun" type="button">New Run</button>
    </p>
    <canvas id="c" width="720" height="420"></canvas>
    <p id="hud"></p>
  </div>
  <script>
    const c = document.getElementById('c');
    const g = c.getContext('2d');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newRunButton = document.getElementById('newRun');

    const levels = {
      easy: { spawnEvery: 52, meteorSpeed: 1.5 },
      medium: { spawnEvery: 38, meteorSpeed: 2.1 },
      hard: { spawnEvery: 27, meteorSpeed: 2.8 }
    };

    const keys = { l: false, r: false };
    const center = { x: c.width / 2, y: c.height / 2 };
    const ship = { angle: 0, radius: 90 };
    const meteors = [];

    let score = 0;
    let tick = 0;
    let over = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function reset() {
      score = 0;
      tick = 0;
      over = false;
      ship.angle = 0;
      meteors.length = 0;
    }

    function spawnMeteor() {
      const angle = Math.random() * Math.PI * 2;
      const dist = 260;
      meteors.push({
        x: center.x + Math.cos(angle) * dist,
        y: center.y + Math.sin(angle) * dist,
        vx: -Math.cos(angle) * (cfg().meteorSpeed + Math.random() * 0.8),
        vy: -Math.sin(angle) * (cfg().meteorSpeed + Math.random() * 0.8),
        r: 9 + Math.random() * 6
      });
    }

    function shipPos() {
      return {
        x: center.x + Math.cos(ship.angle) * ship.radius,
        y: center.y + Math.sin(ship.angle) * ship.radius
      };
    }

    function update() {
      if (over) return;

      if (keys.l) ship.angle -= 0.06;
      if (keys.r) ship.angle += 0.06;

      tick += 1;
      if (tick % cfg().spawnEvery === 0) spawnMeteor();

      const p = shipPos();

      for (let i = meteors.length - 1; i >= 0; i--) {
        const m = meteors[i];
        m.x += m.vx;
        m.y += m.vy;

        const dShip = Math.hypot(m.x - p.x, m.y - p.y);
        if (dShip < m.r + 9) {
          over = true;
          continue;
        }

        const dCore = Math.hypot(m.x - center.x, m.y - center.y);
        if (dCore < 20) {
          meteors.splice(i, 1);
          score += 6;
          continue;
        }

        if (m.x < -40 || m.x > c.width + 40 || m.y < -40 || m.y > c.height + 40) {
          meteors.splice(i, 1);
        }
      }
    }

    function draw() {
      g.clearRect(0, 0, c.width, c.height);

      g.fillStyle = '#f1c57a';
      g.beginPath();
      g.arc(center.x, center.y, 18, 0, Math.PI * 2);
      g.fill();

      g.strokeStyle = 'rgba(175,220,255,0.25)';
      g.beginPath();
      g.arc(center.x, center.y, ship.radius, 0, Math.PI * 2);
      g.stroke();

      const p = shipPos();
      g.fillStyle = '#72d9ff';
      g.beginPath();
      g.arc(p.x, p.y, 8, 0, Math.PI * 2);
      g.fill();

      g.fillStyle = '#ff9a8d';
      for (const m of meteors) {
        g.beginPath();
        g.arc(m.x, m.y, m.r, 0, Math.PI * 2);
        g.fill();
      }

      hud.textContent = over
        ? `Game Over (${levelSelect.value}). Score: ${score}`
        : `Level: ${levelSelect.value} | Score: ${score}`;
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    addEventListener('keydown', e => {
      if (e.code === 'ArrowLeft') keys.l = true;
      if (e.code === 'ArrowRight') keys.r = true;
      if (e.code === 'KeyR') reset();
    });
    addEventListener('keyup', e => {
      if (e.code === 'ArrowLeft') keys.l = false;
      if (e.code === 'ArrowRight') keys.r = false;
    });

    levelSelect.addEventListener('change', reset);
    newRunButton.addEventListener('click', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
