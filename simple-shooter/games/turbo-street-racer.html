<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Turbo Street Racer</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0a1320; color: #ecf6ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(95vw, 700px); text-align: center; }
    a { color: #9ed8ff; }
    canvas { width: 100%; max-width: 520px; height: auto; border: 1px solid #86b6d8; border-radius: 10px; background: linear-gradient(#1e3652, #0e1a2a); }
    .hud { margin: 8px 0; color: #d8e6ff; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-1-shooting.html">P1 Shooting</a> | <a href="../page-2-racing.html">P2 Racing</a> | <a href="../page-3-puzzle.html">P3 Puzzle</a> | <a href="../page-4-arcade.html">P4 Arcade</a> | <a href="../page-5-realistic.html">P5 Realistic</a> | <a href="../page-6-party.html">P6 Party</a></p>
    <h1>Turbo Street Racer</h1>
    <p>Simple fun car game. Move with Left/Right, hold Up to boost, avoid traffic.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newRace" type="button">New Race</button>
    </p>
    <canvas id="c" width="520" height="760"></canvas>
    <p id="hud" class="hud"></p>
  </div>
  <script>
    const c = document.getElementById('c');
    const g = c.getContext('2d');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newRaceButton = document.getElementById('newRace');
    const levels = {
      easy: { baseWorld: 5, boostWorld: 7.2, spawnTick: 35, trafficMin: 3.4, trafficMax: 5.1 },
      medium: { baseWorld: 6, boostWorld: 8.5, spawnTick: 30, trafficMin: 4, trafficMax: 6.5 },
      hard: { baseWorld: 7.4, boostWorld: 10.3, spawnTick: 24, trafficMin: 4.6, trafficMax: 7.4 }
    };

    const keys = { l: false, r: false, u: false };
    const player = { lane: 1, x: 260, y: 640, w: 50, h: 90, speed: 6 };
    const lanes = [160, 260, 360];
    const traffic = [];

    let score = 0;
    let distance = 0;
    let gameOver = false;
    let roadOffset = 0;
    let spawnTick = 0;

    function currentLevel() {
      return levels[levelSelect.value] || levels.medium;
    }

    function spawnCar() {
      const level = currentLevel();
      const lane = Math.floor(Math.random() * 3);
      const speed = level.trafficMin + Math.random() * (level.trafficMax - level.trafficMin);
      traffic.push({ x: lanes[lane], y: -120, w: 50, h: 92, speed, color: `hsl(${Math.floor(Math.random() * 360)} 80% 65%)` });
    }

    function hit(a, b) {
      return a.x - a.w / 2 < b.x + b.w / 2 && a.x + a.w / 2 > b.x - b.w / 2 && a.y - a.h / 2 < b.y + b.h / 2 && a.y + a.h / 2 > b.y - b.h / 2;
    }

    function update() {
      if (gameOver) return;
      const level = currentLevel();

      if (keys.l) player.x -= player.speed;
      if (keys.r) player.x += player.speed;
      player.x = Math.max(120, Math.min(400, player.x));

      const worldSpeed = keys.u ? level.boostWorld : level.baseWorld;
      roadOffset += worldSpeed;
      distance += worldSpeed * 0.15;

      spawnTick += 1;
      if (spawnTick > (keys.u ? Math.max(14, level.spawnTick - 6) : level.spawnTick)) {
        spawnCar();
        spawnTick = 0;
      }

      for (let i = traffic.length - 1; i >= 0; i--) {
        traffic[i].y += traffic[i].speed + worldSpeed * 0.45;
        if (traffic[i].y > c.height + 120) {
          traffic.splice(i, 1);
          score += 5;
          continue;
        }
        if (hit({ x: player.x, y: player.y, w: player.w, h: player.h }, { x: traffic[i].x, y: traffic[i].y, w: traffic[i].w, h: traffic[i].h })) {
          gameOver = true;
        }
      }
    }

    function drawRoad() {
      g.fillStyle = '#222c38';
      g.fillRect(110, 0, 300, c.height);
      g.fillStyle = '#4b5d72';
      g.fillRect(100, 0, 10, c.height);
      g.fillRect(410, 0, 10, c.height);

      g.fillStyle = '#f8f8f8';
      for (let y = -60 + (roadOffset % 60); y < c.height; y += 60) {
        g.fillRect(255, y, 10, 34);
        g.fillRect(155, y, 6, 26);
        g.fillRect(359, y, 6, 26);
      }

      g.fillStyle = '#0f2032';
      g.fillRect(0, 0, 100, c.height);
      g.fillRect(420, 0, 100, c.height);
    }

    function drawCar(x, y, w, h, color) {
      g.save();
      g.translate(x, y);
      g.fillStyle = color;
      g.fillRect(-w / 2, -h / 2, w, h);
      g.fillStyle = '#dff5ff';
      g.fillRect(-w / 2 + 8, -h / 2 + 10, w - 16, 20);
      g.fillStyle = '#0d1118';
      g.fillRect(-w / 2 + 5, -h / 2 + 4, 8, 18);
      g.fillRect(w / 2 - 13, -h / 2 + 4, 8, 18);
      g.fillRect(-w / 2 + 5, h / 2 - 22, 8, 18);
      g.fillRect(w / 2 - 13, h / 2 - 22, 8, 18);
      g.restore();
    }

    function draw() {
      g.clearRect(0, 0, c.width, c.height);

      const sky = g.createLinearGradient(0, 0, 0, c.height);
      sky.addColorStop(0, '#1f4468');
      sky.addColorStop(1, '#0c1624');
      g.fillStyle = sky;
      g.fillRect(0, 0, c.width, c.height);

      drawRoad();

      for (const car of traffic) drawCar(car.x, car.y, car.w, car.h, car.color);
      drawCar(player.x, player.y, player.w, player.h, '#63d2a1');

      hud.textContent = gameOver
        ? `Crash (${levelSelect.value})! Score: ${score} | Distance: ${Math.floor(distance)}m. Press R or New Race.`
        : `Level: ${levelSelect.value} | Score: ${score} | Distance: ${Math.floor(distance)}m`;
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    addEventListener('keydown', e => {
      if (e.code === 'ArrowLeft') keys.l = true;
      if (e.code === 'ArrowRight') keys.r = true;
      if (e.code === 'ArrowUp') keys.u = true;
      if (e.code === 'KeyR' && gameOver) {
        traffic.length = 0;
        score = 0;
        distance = 0;
        gameOver = false;
        spawnTick = 0;
        player.x = 260;
      }
    });

    addEventListener('keyup', e => {
      if (e.code === 'ArrowLeft') keys.l = false;
      if (e.code === 'ArrowRight') keys.r = false;
      if (e.code === 'ArrowUp') keys.u = false;
    });

    function resetRace() {
      traffic.length = 0;
      score = 0;
      distance = 0;
      gameOver = false;
      spawnTick = 0;
      player.x = 260;
    }

    newRaceButton.addEventListener('click', resetRace);
    levelSelect.addEventListener('change', resetRace);

    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
