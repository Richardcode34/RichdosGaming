<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Urban Sniper</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111821; color: #eef8ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(95vw, 900px); text-align: center; }
    a { color: #9ed8ff; }
    canvas { width: 100%; max-width: 860px; border: 1px solid #8fbfe0; border-radius: 10px; background: linear-gradient(#374a5c, #223240); }
    select, button { border: 1px solid #94c3e0; border-radius: 8px; background: #2a4f70; color: #eef9ff; padding: 7px 10px; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-1-shooting.html">P1 Shooting</a> | <a href="../page-2-racing.html">P2 Racing</a> | <a href="../page-3-puzzle.html">P3 Puzzle</a> | <a href="../page-4-arcade.html">P4 Arcade</a> | <a href="../page-5-realistic.html">P5 Realistic</a> | <a href="../page-6-party.html">P6 Party</a></p>
    <h1>Urban Sniper</h1>
    <p>More realistic aim game. Move mouse to aim, click to shoot moving targets.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newMission" type="button">New Mission</button>
    </p>
    <canvas id="c" width="860" height="500"></canvas>
    <p id="hud"></p>
  </div>
  <script>
    const c = document.getElementById('c');
    const g = c.getContext('2d');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newMissionButton = document.getElementById('newMission');

    const levels = {
      easy: { missionTime: 45, targetEvery: 90, targetSpeed: 1.2, targetSize: 22 },
      medium: { missionTime: 40, targetEvery: 65, targetSpeed: 1.9, targetSize: 18 },
      hard: { missionTime: 35, targetEvery: 45, targetSpeed: 2.5, targetSize: 14 }
    };

    const scope = { x: c.width / 2, y: c.height / 2 };
    const targets = [];
    const shots = [];
    let score = 0;
    let timeLeft = 0;
    let tick = 0;
    let timer = null;
    let active = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function spawnTarget() {
      const lv = cfg();
      const side = Math.random() < 0.5 ? 'left' : 'right';
      const y = 110 + Math.random() * 280;
      const size = lv.targetSize + Math.random() * 7;
      targets.push({
        x: side === 'left' ? -size : c.width + size,
        y,
        r: size,
        vx: (side === 'left' ? 1 : -1) * (lv.targetSpeed + Math.random() * 0.6)
      });
    }

    function startMission() {
      score = 0;
      tick = 0;
      targets.length = 0;
      shots.length = 0;
      timeLeft = cfg().missionTime;
      active = true;
      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft -= 1;
        if (timeLeft <= 0) {
          active = false;
          clearInterval(timer);
        }
      }, 1000);
    }

    function shoot() {
      if (!active) return;
      shots.push({ x: scope.x, y: scope.y, life: 8 });
      for (let i = targets.length - 1; i >= 0; i--) {
        const t = targets[i];
        const dx = t.x - scope.x;
        const dy = t.y - scope.y;
        if (Math.hypot(dx, dy) <= t.r) {
          score += Math.max(5, Math.floor(32 - t.r));
          targets.splice(i, 1);
          return;
        }
      }
    }

    function drawScene() {
      const sky = g.createLinearGradient(0, 0, 0, c.height);
      sky.addColorStop(0, '#5e7488');
      sky.addColorStop(1, '#2a3947');
      g.fillStyle = sky;
      g.fillRect(0, 0, c.width, c.height);

      g.fillStyle = '#19242e';
      for (let i = 0; i < 12; i++) {
        const w = 50 + (i % 3) * 20;
        const h = 130 + (i % 5) * 22;
        g.fillRect(i * 76, c.height - h, w, h);
      }

      g.fillStyle = '#243444';
      g.fillRect(0, c.height - 80, c.width, 80);
    }

    function update() {
      if (active) {
        tick += 1;
        if (tick % cfg().targetEvery === 0) spawnTarget();
      }

      for (let i = targets.length - 1; i >= 0; i--) {
        targets[i].x += targets[i].vx;
        if (targets[i].x < -50 || targets[i].x > c.width + 50) targets.splice(i, 1);
      }

      for (let i = shots.length - 1; i >= 0; i--) {
        shots[i].life -= 1;
        if (shots[i].life <= 0) shots.splice(i, 1);
      }
    }

    function drawScope() {
      g.strokeStyle = 'rgba(230,245,255,0.9)';
      g.lineWidth = 2;
      g.beginPath();
      g.arc(scope.x, scope.y, 18, 0, Math.PI * 2);
      g.stroke();
      g.beginPath();
      g.moveTo(scope.x - 28, scope.y);
      g.lineTo(scope.x + 28, scope.y);
      g.moveTo(scope.x, scope.y - 28);
      g.lineTo(scope.x, scope.y + 28);
      g.stroke();
    }

    function draw() {
      drawScene();

      for (const t of targets) {
        g.fillStyle = '#ff9b8f';
        g.beginPath();
        g.arc(t.x, t.y, t.r, 0, Math.PI * 2);
        g.fill();
      }

      for (const s of shots) {
        g.strokeStyle = `rgba(255,240,170,${s.life / 8})`;
        g.lineWidth = 3;
        g.beginPath();
        g.arc(s.x, s.y, 24 - s.life, 0, Math.PI * 2);
        g.stroke();
      }

      drawScope();

      hud.textContent = active
        ? `Level: ${levelSelect.value} | Score: ${score} | Time: ${timeLeft}s`
        : `Mission ended. Level: ${levelSelect.value} | Final score: ${score}. Click New Mission.`;
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    c.addEventListener('mousemove', e => {
      const r = c.getBoundingClientRect();
      scope.x = (e.clientX - r.left) * (c.width / r.width);
      scope.y = (e.clientY - r.top) * (c.height / r.height);
    });
    c.addEventListener('mousedown', shoot);

    newMissionButton.addEventListener('click', startMission);
    levelSelect.addEventListener('change', startMission);

    startMission();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
