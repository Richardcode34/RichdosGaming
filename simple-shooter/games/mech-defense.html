<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Mech Defense</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f1a29; color: #eef8ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(94vw, 820px); text-align: center; }
    a { color: #9ed8ff; }
    canvas { border: 1px solid #90bfde; border-radius: 10px; background: linear-gradient(#1d3249, #0e1e31); }
    select, button { border: 1px solid #97c6e4; border-radius: 8px; background: #285074; color: #eef9ff; padding: 7px 10px; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-1-shooting.html">P1 Shooting</a> | <a href="../page-6-party.html">P6 Party</a></p>
    <h1>Mech Defense</h1>
    <p>Defend the base from incoming bots. Move with A/D and shoot with Space.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newGame" type="button">New Game</button>
    </p>
    <canvas id="c" width="760" height="440"></canvas>
    <p id="hud"></p>
  </div>
  <script>
    const c = document.getElementById('c');
    const g = c.getContext('2d');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newGameButton = document.getElementById('newGame');

    const levels = {
      easy: { spawnEvery: 52, enemySpeed: 1.2, enemyHp: 1 },
      medium: { spawnEvery: 38, enemySpeed: 1.7, enemyHp: 2 },
      hard: { spawnEvery: 26, enemySpeed: 2.2, enemyHp: 3 }
    };

    const keys = { l: false, r: false, fire: false };
    const mech = { x: 360, y: 380, w: 42, h: 24, cd: 0 };
    const bullets = [];
    const enemies = [];

    let score = 0;
    let baseHp = 6;
    let tick = 0;
    let over = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function reset() {
      score = 0;
      baseHp = 6;
      tick = 0;
      over = false;
      bullets.length = 0;
      enemies.length = 0;
      mech.x = 360;
      mech.cd = 0;
    }

    function overlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function spawnEnemy() {
      const lv = cfg();
      enemies.push({ x: Math.random() * (c.width - 30), y: -30, w: 30, h: 22, hp: lv.enemyHp, vy: lv.enemySpeed + Math.random() * 0.7 });
    }

    function update() {
      if (over) return;
      const lv = cfg();
      if (keys.l) mech.x -= 4.2;
      if (keys.r) mech.x += 4.2;
      mech.x = Math.max(0, Math.min(c.width - mech.w, mech.x));

      if (mech.cd > 0) mech.cd -= 1;
      if (keys.fire && mech.cd <= 0) {
        bullets.push({ x: mech.x + mech.w / 2 - 2, y: mech.y - 8, w: 4, h: 10, vy: 7 });
        mech.cd = 9;
      }

      tick += 1;
      if (tick % lv.spawnEvery === 0) spawnEnemy();

      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= bullets[i].vy;
        if (bullets[i].y < -14) bullets.splice(i, 1);
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += e.vy;

        if (e.y > c.height - 26) {
          baseHp -= 1;
          enemies.splice(i, 1);
          if (baseHp <= 0) over = true;
          continue;
        }

        for (let j = bullets.length - 1; j >= 0; j--) {
          if (overlap(e, bullets[j])) {
            bullets.splice(j, 1);
            e.hp -= 1;
            if (e.hp <= 0) {
              enemies.splice(i, 1);
              score += 10;
            }
            break;
          }
        }
      }
    }

    function draw() {
      g.clearRect(0, 0, c.width, c.height);
      g.fillStyle = '#26394f';
      g.fillRect(0, c.height - 24, c.width, 24);

      g.fillStyle = '#66d8a6';
      g.fillRect(mech.x, mech.y, mech.w, mech.h);
      g.fillStyle = '#ffd888';
      for (const b of bullets) g.fillRect(b.x, b.y, b.w, b.h);
      g.fillStyle = '#ff9a8e';
      for (const e of enemies) g.fillRect(e.x, e.y, e.w, e.h);

      hud.textContent = over
        ? `Game Over (${levelSelect.value}). Score: ${score}`
        : `Level: ${levelSelect.value} | Score: ${score} | Base HP: ${baseHp}`;
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    addEventListener('keydown', e => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.l = true;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.r = true;
      if (e.code === 'Space') { keys.fire = true; e.preventDefault(); }
      if (e.code === 'KeyR') reset();
    });
    addEventListener('keyup', e => {
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.l = false;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.r = false;
      if (e.code === 'Space') { keys.fire = false; e.preventDefault(); }
    });

    levelSelect.addEventListener('change', reset);
    newGameButton.addEventListener('click', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
