<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Stealth Heist</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #10151f; color: #ebf2ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(95vw, 900px); text-align: center; }
    a { color: #9fc7ff; }
    #map { margin: 10px auto; width: min(94vw, 820px); height: 440px; border: 1px solid #8aa7d2; border-radius: 10px; background: linear-gradient(#1a2434, #0f1622); position: relative; overflow: hidden; }
    .wall, .guard, .loot, .player, .cone { position: absolute; }
    .wall { background: #34445d; }
    .guard { width: 22px; height: 22px; border-radius: 999px; background: #ff9595; }
    .loot { width: 16px; height: 16px; border-radius: 4px; background: #ffd77a; }
    .player { width: 20px; height: 20px; border-radius: 6px; background: #8dffcc; }
    .cone { background: rgba(255,124,124,.18); border-radius: 16px; }
    button, select { border: 1px solid #97b7e4; border-radius: 8px; background: #2a3f63; color: #eef6ff; padding: 8px 12px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-5-realistic.html">P5 Realistic</a> | <a href="../page-3-puzzle.html">P3 Puzzle</a></p>
    <h1>Stealth Heist</h1>
    <p>Stealth game. Move with Arrow keys, collect all loot, avoid guard vision.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newMission" type="button">New Mission</button>
    </p>
    <div id="map"></div>
    <p id="hud"></p>
  </div>

  <script>
    const map = document.getElementById('map');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newMissionButton = document.getElementById('newMission');

    const W = 820;
    const H = 440;

    const levels = {
      easy: { guards: 2, speed: 2.2 },
      medium: { guards: 3, speed: 2.8 },
      hard: { guards: 4, speed: 3.3 }
    };

    let player;
    let guards = [];
    let loot = [];
    let walls = [];
    let keys = { left: false, right: false, up: false, down: false };
    let score = 0;
    let over = false;
    let win = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function reset() {
      player = { x: 30, y: 30, w: 20, h: 20 };
      guards = [];
      loot = [];
      walls = [
        { x: 140, y: 60, w: 20, h: 280 },
        { x: 300, y: 0, w: 20, h: 230 },
        { x: 300, y: 300, w: 20, h: 140 },
        { x: 480, y: 80, w: 20, h: 300 },
        { x: 640, y: 0, w: 20, h: 240 },
        { x: 640, y: 320, w: 20, h: 120 }
      ];

      for (let i = 0; i < cfg().guards; i++) {
        guards.push({
          x: 180 + i * 160,
          y: 80 + (i % 2) * 220,
          w: 22,
          h: 22,
          vx: i % 2 ? 1.5 : -1.5,
          vy: i % 2 ? 0 : 1.2,
          viewW: 120,
          viewH: 70
        });
      }

      for (let i = 0; i < 6; i++) {
        loot.push({ x: 80 + i * 120, y: 50 + (i % 3) * 120, w: 16, h: 16, alive: true });
      }

      score = 0;
      over = false;
      win = false;
      render();
    }

    function intersects(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function blocked(rect) {
      return walls.some(w => intersects(rect, w));
    }

    function movePlayer() {
      if (over) return;
      const s = cfg().speed;
      const nx = player.x + (keys.right ? s : 0) - (keys.left ? s : 0);
      const ny = player.y + (keys.down ? s : 0) - (keys.up ? s : 0);

      const tx = { ...player, x: Math.max(0, Math.min(W - player.w, nx)) };
      if (!blocked(tx)) player.x = tx.x;
      const ty = { ...player, y: Math.max(0, Math.min(H - player.h, ny)) };
      if (!blocked(ty)) player.y = ty.y;
    }

    function updateGuards() {
      for (const g of guards) {
        g.x += g.vx;
        g.y += g.vy;
        if (g.x < 20 || g.x > W - 40) g.vx *= -1;
        if (g.y < 20 || g.y > H - 40) g.vy *= -1;

        const cone = {
          x: g.vx >= 0 ? g.x : g.x - g.viewW + g.w,
          y: g.y - (g.viewH - g.h) / 2,
          w: g.viewW,
          h: g.viewH
        };
        if (intersects(player, cone) || intersects(player, g)) {
          over = true;
          win = false;
        }
      }
    }

    function updateLoot() {
      for (const l of loot) {
        if (!l.alive) continue;
        if (intersects(player, l)) {
          l.alive = false;
          score += 20;
        }
      }
      if (loot.every(l => !l.alive)) {
        over = true;
        win = true;
        score += 40;
      }
    }

    function update() {
      if (over) return;
      movePlayer();
      updateGuards();
      updateLoot();
    }

    function render() {
      map.innerHTML = '';

      for (const w of walls) {
        const el = document.createElement('div');
        el.className = 'wall';
        el.style.left = `${w.x}px`;
        el.style.top = `${w.y}px`;
        el.style.width = `${w.w}px`;
        el.style.height = `${w.h}px`;
        map.appendChild(el);
      }

      for (const l of loot) {
        if (!l.alive) continue;
        const el = document.createElement('div');
        el.className = 'loot';
        el.style.left = `${l.x}px`;
        el.style.top = `${l.y}px`;
        map.appendChild(el);
      }

      for (const g of guards) {
        const cone = document.createElement('div');
        cone.className = 'cone';
        cone.style.left = `${g.vx >= 0 ? g.x : g.x - g.viewW + g.w}px`;
        cone.style.top = `${g.y - (g.viewH - g.h) / 2}px`;
        cone.style.width = `${g.viewW}px`;
        cone.style.height = `${g.viewH}px`;
        map.appendChild(cone);

        const el = document.createElement('div');
        el.className = 'guard';
        el.style.left = `${g.x}px`;
        el.style.top = `${g.y}px`;
        map.appendChild(el);
      }

      const me = document.createElement('div');
      me.className = 'player';
      me.style.left = `${player.x}px`;
      me.style.top = `${player.y}px`;
      map.appendChild(me);

      hud.textContent = over
        ? (win ? `Mission complete (${levelSelect.value})! Score: ${score}` : `Spotted! (${levelSelect.value}) Score: ${score}`)
        : `Level: ${levelSelect.value} | Score: ${score} | Loot left: ${loot.filter(l => l.alive).length}`;
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = true;
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = true;
    });

    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.up = false;
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.down = false;
    });

    newMissionButton.addEventListener('click', reset);
    levelSelect.addEventListener('change', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
