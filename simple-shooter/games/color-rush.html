<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Color Rush</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f1a2d; color: #eef8ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(92vw, 740px); text-align: center; }
    a { color: #9ed8ff; }
    #grid { margin: 10px auto; width: min(92vw, 560px); display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .tile { height: 86px; border: none; border-radius: 10px; cursor: pointer; }
    button, select { border: 1px solid #97c6e4; border-radius: 8px; background: #274f73; color: #eef9ff; padding: 8px 10px; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-4-arcade.html">Page 4: Arcade</a></p>
    <h1>Color Rush</h1>
    <p>Click the target color as fast as possible.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="start" type="button">Start Round</button>
    </p>
    <div id="grid"></div>
    <p id="hud"></p>
  </div>
  <script>
    const grid = document.getElementById('grid');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const startButton = document.getElementById('start');

    const colors = ['#ff7f8c', '#ffd27a', '#71d7ff', '#7ef2b2', '#b7a2ff', '#ff9fe4', '#ffa46a'];
    const levels = {
      easy: { time: 40, penalty: 1 },
      medium: { time: 30, penalty: 2 },
      hard: { time: 24, penalty: 3 }
    };

    let score = 0;
    let target = '#ff7f8c';
    let timeLeft = 0;
    let timer = null;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function pickTarget() {
      target = colors[Math.floor(Math.random() * colors.length)];
    }

    function buildGrid() {
      grid.innerHTML = '';
      const targetIndex = Math.floor(Math.random() * 16);
      for (let i = 0; i < 16; i++) {
        const btn = document.createElement('button');
        btn.className = 'tile';
        const color = i === targetIndex ? target : colors[Math.floor(Math.random() * colors.length)];
        btn.style.background = color;
        btn.addEventListener('click', () => {
          if (!timer) return;
          if (color === target) {
            score += 5;
            pickTarget();
            buildGrid();
          } else {
            score = Math.max(0, score - cfg().penalty);
            refreshHud();
          }
        });
        grid.appendChild(btn);
      }
    }

    function refreshHud() {
      hud.textContent = timer
        ? `Level: ${levelSelect.value} | Score: ${score} | Time: ${timeLeft}s | Target color shown below`
        : `Round ended. Level: ${levelSelect.value} | Score: ${score}`;
      hud.style.color = target;
    }

    function startRound() {
      clearInterval(timer);
      score = 0;
      timeLeft = cfg().time;
      pickTarget();
      buildGrid();
      refreshHud();
      timer = setInterval(() => {
        timeLeft -= 1;
        refreshHud();
        if (timeLeft <= 0) {
          clearInterval(timer);
          timer = null;
          refreshHud();
        }
      }, 1000);
    }

    startButton.addEventListener('click', startRound);
    levelSelect.addEventListener('change', startRound);

    startRound();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
