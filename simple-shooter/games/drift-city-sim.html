<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Drift City Sim</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #121820; color: #eff7ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(95vw, 900px); text-align: center; }
    a { color: #a4dcff; }
    canvas { width: 100%; max-width: 860px; border: 1px solid #8fbde0; border-radius: 10px; background: linear-gradient(#1d2733, #0f1720); }
    select, button { border: 1px solid #97c6e4; border-radius: 8px; background: #274f73; color: #eef9ff; padding: 7px 10px; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-1-shooting.html">P1 Shooting</a> | <a href="../page-2-racing.html">P2 Racing</a> | <a href="../page-3-puzzle.html">P3 Puzzle</a> | <a href="../page-4-arcade.html">P4 Arcade</a> | <a href="../page-5-realistic.html">P5 Realistic</a> | <a href="../page-6-party.html">P6 Party</a></p>
    <h1>Drift City Sim</h1>
    <p>More realistic car handling. Use WASD or Arrow keys.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newDrive" type="button">New Drive</button>
    </p>
    <canvas id="c" width="860" height="520"></canvas>
    <p id="hud"></p>
  </div>
  <script>
    const c = document.getElementById('c');
    const g = c.getContext('2d');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newDriveButton = document.getElementById('newDrive');

    const levels = {
      easy: { accel: 0.12, maxSpeed: 4.2, turnGrip: 0.075, obstacleCount: 10 },
      medium: { accel: 0.14, maxSpeed: 5.2, turnGrip: 0.055, obstacleCount: 14 },
      hard: { accel: 0.17, maxSpeed: 6.1, turnGrip: 0.038, obstacleCount: 18 }
    };

    const keys = { up: false, down: false, left: false, right: false };
    const car = { x: 430, y: 260, angle: -Math.PI / 2, speed: 0, vx: 0, vy: 0, w: 22, h: 40 };
    let cones = [];
    let score = 0;
    let crashed = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }

    function spawnCones() {
      cones = [];
      const count = cfg().obstacleCount;
      for (let i = 0; i < count; i++) {
        cones.push({ x: 80 + Math.random() * 700, y: 70 + Math.random() * 380, r: 12 + Math.random() * 7 });
      }
    }

    function reset() {
      car.x = 430;
      car.y = 260;
      car.angle = -Math.PI / 2;
      car.speed = 0;
      car.vx = 0;
      car.vy = 0;
      score = 0;
      crashed = false;
      spawnCones();
    }

    function update() {
      if (crashed) return;
      const lv = cfg();

      if (keys.up) car.speed += lv.accel;
      if (keys.down) car.speed -= lv.accel * 0.9;
      car.speed *= 0.98;
      car.speed = Math.max(-lv.maxSpeed * 0.4, Math.min(lv.maxSpeed, car.speed));

      const steer = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
      if (Math.abs(car.speed) > 0.2) {
        car.angle += steer * (0.045 + Math.abs(car.speed) * 0.01);
      }

      const targetVx = Math.cos(car.angle) * car.speed;
      const targetVy = Math.sin(car.angle) * car.speed;
      car.vx += (targetVx - car.vx) * lv.turnGrip;
      car.vy += (targetVy - car.vy) * lv.turnGrip;
      car.x += car.vx;
      car.y += car.vy;

      if (car.x < 40 || car.x > c.width - 40 || car.y < 40 || car.y > c.height - 40) crashed = true;

      for (const cone of cones) {
        const dx = car.x - cone.x;
        const dy = car.y - cone.y;
        if (Math.hypot(dx, dy) < cone.r + 12) {
          crashed = true;
          break;
        }
      }

      if (!crashed) score += Math.abs(car.speed) * 0.5;
    }

    function drawTrack() {
      g.fillStyle = '#2e3d4e';
      g.fillRect(0, 0, c.width, c.height);
      g.fillStyle = '#121a22';
      g.fillRect(36, 36, c.width - 72, c.height - 72);
      g.strokeStyle = '#d8e5f2';
      g.setLineDash([18, 14]);
      g.lineWidth = 2;
      g.strokeRect(70, 70, c.width - 140, c.height - 140);
      g.setLineDash([]);
    }

    function drawCar() {
      g.save();
      g.translate(car.x, car.y);
      g.rotate(car.angle + Math.PI / 2);
      g.fillStyle = '#67d4a5';
      g.fillRect(-car.w / 2, -car.h / 2, car.w, car.h);
      g.fillStyle = '#dbf5ff';
      g.fillRect(-car.w / 2 + 3, -car.h / 2 + 4, car.w - 6, 12);
      g.restore();
    }

    function draw() {
      drawTrack();
      for (const cone of cones) {
        g.fillStyle = '#ff9f74';
        g.beginPath();
        g.arc(cone.x, cone.y, cone.r, 0, Math.PI * 2);
        g.fill();
      }
      drawCar();

      hud.textContent = crashed
        ? `Crash (${levelSelect.value})! Drive score: ${Math.floor(score)}. Click New Drive.`
        : `Level: ${levelSelect.value} | Speed: ${car.speed.toFixed(2)} | Drive score: ${Math.floor(score)}`;
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    addEventListener('keydown', e => {
      if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = true;
      if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = true;
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
      if (e.code === 'KeyR') reset();
    });

    addEventListener('keyup', e => {
      if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
      if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false;
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
      if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    });

    newDriveButton.addEventListener('click', reset);
    levelSelect.addEventListener('change', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
