<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../graphics.css" />
  <title>Asteroid Miner</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f1d30; color: #eef8ff; font-family: Trebuchet MS, sans-serif; }
    .shell { width: min(94vw, 780px); text-align: center; }
    a { color: #9ed8ff; }
    canvas { border: 1px solid #8ec0df; border-radius: 10px; background: radial-gradient(circle at 50% 20%, #243f5f, #0a1625 70%); }
    select, button { border: 1px solid #97c6e4; border-radius: 8px; background: #275074; color: #eef9ff; padding: 7px 10px; }
  </style>
</head>
<body>
  <div class="shell">
    <p><a href="../index.html">Home</a> | <a href="../page-4-arcade.html">P4 Arcade</a> | <a href="../page-5-realistic.html">P5 Realistic</a></p>
    <h1>Asteroid Miner</h1>
    <p>Mine drifting asteroids with your laser. Move with Left/Right, shoot with Space.</p>
    <p>
      Level:
      <select id="level">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button id="newRun" type="button">New Run</button>
    </p>
    <canvas id="c" width="720" height="420"></canvas>
    <p id="hud"></p>
  </div>
  <script>
    const c = document.getElementById('c');
    const g = c.getContext('2d');
    const hud = document.getElementById('hud');
    const levelSelect = document.getElementById('level');
    const newRunButton = document.getElementById('newRun');

    const levels = {
      easy: { spawnEvery: 55, asteroidSpeed: 1.2 },
      medium: { spawnEvery: 40, asteroidSpeed: 1.8 },
      hard: { spawnEvery: 28, asteroidSpeed: 2.5 }
    };

    const keys = { l: false, r: false, shoot: false };
    const ship = { x: 340, y: 370, w: 40, h: 24, cd: 0 };
    const lasers = [];
    const asteroids = [];

    let score = 0;
    let hp = 5;
    let tick = 0;
    let over = false;

    function cfg() { return levels[levelSelect.value] || levels.medium; }
    function overlap(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

    function reset() {
      score = 0;
      hp = 5;
      tick = 0;
      over = false;
      ship.x = 340;
      ship.cd = 0;
      lasers.length = 0;
      asteroids.length = 0;
    }

    function spawnAsteroid() {
      const size = 16 + Math.random() * 18;
      asteroids.push({ x: Math.random() * (c.width - size), y: -size, w: size, h: size, vy: cfg().asteroidSpeed + Math.random() * 0.9 });
    }

    function update() {
      if (over) return;
      if (keys.l) ship.x -= 4;
      if (keys.r) ship.x += 4;
      ship.x = Math.max(0, Math.min(c.width - ship.w, ship.x));

      if (ship.cd > 0) ship.cd -= 1;
      if (keys.shoot && ship.cd <= 0) {
        lasers.push({ x: ship.x + ship.w / 2 - 2, y: ship.y - 8, w: 4, h: 10, vy: 8 });
        ship.cd = 8;
      }

      tick += 1;
      if (tick % cfg().spawnEvery === 0) spawnAsteroid();

      for (let i = lasers.length - 1; i >= 0; i--) {
        lasers[i].y -= lasers[i].vy;
        if (lasers[i].y < -14) lasers.splice(i, 1);
      }

      for (let i = asteroids.length - 1; i >= 0; i--) {
        const a = asteroids[i];
        a.y += a.vy;

        if (a.y > c.height - 20) {
          hp -= 1;
          asteroids.splice(i, 1);
          if (hp <= 0) over = true;
          continue;
        }

        for (let j = lasers.length - 1; j >= 0; j--) {
          if (overlap(a, lasers[j])) {
            lasers.splice(j, 1);
            asteroids.splice(i, 1);
            score += Math.floor(a.w);
            break;
          }
        }
      }
    }

    function draw() {
      g.clearRect(0, 0, c.width, c.height);

      g.fillStyle = '#6fd9ff';
      g.fillRect(ship.x, ship.y, ship.w, ship.h);
      g.fillStyle = '#ffd98a';
      for (const l of lasers) g.fillRect(l.x, l.y, l.w, l.h);
      g.fillStyle = '#a9b3c4';
      for (const a of asteroids) {
        g.beginPath();
        g.arc(a.x + a.w / 2, a.y + a.h / 2, a.w / 2, 0, Math.PI * 2);
        g.fill();
      }

      hud.textContent = over
        ? `Game Over (${levelSelect.value}). Score: ${score}`
        : `Level: ${levelSelect.value} | Score: ${score} | Hull: ${hp}`;
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }

    addEventListener('keydown', e => {
      if (e.code === 'ArrowLeft') keys.l = true;
      if (e.code === 'ArrowRight') keys.r = true;
      if (e.code === 'Space') { keys.shoot = true; e.preventDefault(); }
      if (e.code === 'KeyR') reset();
    });
    addEventListener('keyup', e => {
      if (e.code === 'ArrowLeft') keys.l = false;
      if (e.code === 'ArrowRight') keys.r = false;
      if (e.code === 'Space') { keys.shoot = false; e.preventDefault(); }
    });

    newRunButton.addEventListener('click', reset);
    levelSelect.addEventListener('change', reset);

    reset();
    loop();
  </script>
  <script src="../player-system.js"></script>
  <script src="../music-system.js"></script>
</body>
</html>
